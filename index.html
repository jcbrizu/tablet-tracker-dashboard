function chartBlock(title,sub,svg){
  return `<div class="chart"><div class="clabel"><span class="t">${esc(title)}</span><span class="s">${esc(sub)}</span></div>${svg}</div>`;
}

const CH_W=1000, CH_PADL=42, CH_PADR=14, CH_PLOTW=CH_W-CH_PADL-CH_PADR;

/* ---- interacción del historial (crosshair + tooltip + zoom) ---- */
let histCharts=[], histPts=[], histX0=0, histX1=0, histGaps=[];
let histHover=false, histDrag=null;

/* --- gráfico de líneas SVG, corta en huecos, marca huecos y carga --- */
function lineChart(pts,opt){
  const W=CH_W,H=170,padL=CH_PADL,padR=CH_PADR,padT=14,padB=22;
  const plotW=CH_PLOTW, plotH=H-padT-padB;
  const {x0,x1}=opt;
  const valPts=pts.filter(p=>opt.get(p.r)!=null).map(p=>({t:p.t,v:Number(opt.get(p.r)),r:p.r}));
  let yMax=opt.yMax, yMin=opt.yMin;
  if(yMax==null){ yMax=Math.max(10,...valPts.map(p=>p.v)); yMax=niceTop(yMax); }
  const X=t=>padL+((t-x0)/(x1-x0))*plotW;
  const Y=v=>padT+(1-((v-yMin)/(yMax-yMin||1)))*plotH;

  // huecos (gray bands) sobre TODO el rango, según cadencia
  const gaps=findGaps(pts.map(p=>p.t),x0,x1);
  const gapRects=gaps.map(g=>`<rect x="${X(g[0]).toFixed(1)}" y="${padT}" width="${(X(g[1])-X(g[0])).toFixed(1)}" height="${plotH}" fill="var(--gap)" opacity="0.5"/>`).join("");

  // grilla horizontal fina
  let grid="",labels="";
  const steps=4;
  for(let i=0;i<=steps;i++){
    const v=yMin+(yMax-yMin)*i/steps; const y=Y(v);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1" opacity="0.7"/>`;
    labels+=`<text x="${padL-6}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--dim)">${Math.round(v)}</text>`;
  }
  // ticks tiempo
  const tticks=timeTicks(x0,x1);
  const span=x1-x0;
  const tlabels=tticks.map(t=>`<text x="${X(t).toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--dim)">${esc(tickLabel(t,span))}</text>`).join("");

  // path cortando en huecos
  let dLine="",dFill="";
  let prevT=null,started=false,fillStartX=null;
  const segs=[]; let cur=[];
  for(const p of valPts){
    if(prevT!=null && (p.t-prevT)/60000>GAP_MIN){ if(cur.length)segs.push(cur); cur=[]; }
    cur.push(p); prevT=p.t;
  }
  if(cur.length)segs.push(cur);
  segs.forEach(seg=>{
    dLine+="M"+seg.map(p=>`${X(p.t).toFixed(1)},${Y(p.v).toFixed(1)}`).join("L");
    if(opt.fill && seg.length){
      dFill+=`M${X(seg[0].t).toFixed(1)},${(padT+plotH).toFixed(1)}L`+seg.map(p=>`${X(p.t).toFixed(1)},${Y(p.v).toFixed(1)}`).join("L")+`L${X(seg[seg.length-1].t).toFixed(1)},${(padT+plotH).toFixed(1)}Z`;
    }
  });

  // marcas de carga (batería): puntos donde charging=true
  let chargeDots="";
  if(opt.chargeGet){
    chargeDots=valPts.filter(p=>opt.chargeGet(p.r)===true).map(p=>`<circle cx="${X(p.t).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="2.6" fill="var(--accent)"/>`).join("");
  }
  const dots = valPts.length<=60 ? valPts.map(p=>`<circle cx="${X(p.t).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="1.6" fill="${opt.color}"/>`).join("") : "";

  const chargeLegend = opt.chargeGet?`<div class="legend"><span><span class="sw" style="background:var(--accent);border-radius:50%"></span>Cargando</span><span><span class="sw" style="background:var(--gap)"></span>Sin señal</span></div>`:`<div class="legend"><span><span class="sw" style="background:var(--gap)"></span>Sin señal</span></div>`;

  histCharts.push({padT, plotH, yMin, yMax, get:opt.get, hasDot:true});
  const inter=`
    <rect class="selrect" y="${padT}" height="${plotH}" x="0" width="0" fill="var(--accent)" opacity="0.14" visibility="hidden"/>
    <g class="xh" visibility="hidden">
      <line class="xline" x1="0" x2="0" y1="${padT}" y2="${padT+plotH}" stroke="var(--dim)" stroke-width="1" opacity="0.7" vector-effect="non-scaling-stroke"/>
      <circle class="xdot" r="3.4" fill="${opt.color}" stroke="var(--panel)" stroke-width="1.5"/>
    </g>`;

  return `<svg class="hsvg" data-ci="${histCharts.length-1}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img">
    ${gapRects}${grid}
    ${opt.fill?`<path d="${dFill}" fill="${opt.color}" opacity="0.12"/>`:""}
    <path d="${dLine}" fill="none" stroke="${opt.color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${chargeDots}${labels}${tlabels}${inter}
  </svg>${chargeLegend}`;
}

/* --- banda de conectividad --- */
function connectivityBlock(pts,x0,x1){
  const W=CH_W,H=54,padL=CH_PADL,padR=CH_PADR,padT=10;
  const plotW=CH_PLOTW, bandH=22;
  const X=t=>padL+((t-x0)/(x1-x0))*plotW;
  let rects="";
  if(pts.length===0){
    // sin puntos en el rango: banda gris "sin señal" en todo el ancho,
    // igual que hacen los gráficos de línea via findGaps() en este caso.
    rects=`<rect x="${X(x0).toFixed(1)}" y="${padT}" width="${(X(x1)-X(x0)).toFixed(1)}" height="${bandH}" fill="var(--gap)" opacity="0.55"/>`;
  }
  for(let i=0;i<pts.length;i++){
    const p=pts[i]; const next=pts[i+1];
    const tEnd = next?Math.min(next.t,x1):Math.min(p.t+15*60000,x1);
    if(next && (next.t-p.t)/60000>GAP_MIN){
      // segmento del dato + hueco hasta next
      const solidEnd=Math.min(p.t+15*60000,next.t);
      rects+=seg(X(p.t),X(solidEnd),segColor(p.r));
      rects+=`<rect x="${X(solidEnd).toFixed(1)}" y="${padT}" width="${(X(next.t)-X(solidEnd)).toFixed(1)}" height="${bandH}" fill="var(--gap)" opacity="0.55"/>`;
    }else{
      rects+=seg(X(p.t),X(tEnd),segColor(p.r));
    }
  }
  // hueco inicial y final
  if(pts.length){
    if((pts[0].t-x0)/60000>GAP_MIN) rects=`<rect x="${X(x0).toFixed(1)}" y="${padT}" width="${(X(pts[0].t)-X(x0)).toFixed(1)}" height="${bandH}" fill="var(--gap)" opacity="0.55"/>`+rects;
    const lastEnd=Math.min(pts[pts.length-1].t+15*60000,x1);
    if((x1-lastEnd)/60000>GAP_MIN) rects+=`<rect x="${X(lastEnd).toFixed(1)}" y="${padT}" width="${(X(x1)-X(lastEnd)).toFixed(1)}" height="${bandH}" fill="var(--gap)" opacity="0.55"/>`;
  }
  const tticks=timeTicks(x0,x1);
  const span=x1-x0;
  const tlabels=tticks.map(t=>`<text x="${X(t).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="10" fill="var(--dim)">${esc(tickLabel(t,span))}</text>`).join("");
  function seg(xa,xb,col){ if(xb<=xa) return ""; return `<rect x="${xa.toFixed(1)}" y="${padT}" width="${(xb-xa).toFixed(1)}" height="${bandH}" fill="${col}"/>`; }
  function segColor(r){
    if(isNil(r.net_transport)||r.net_transport==="none"||r.airplane_mode===true) return "var(--nonet)";
    if(r.net_validated===false) return "var(--noint)";
    if(r.net_transport==="wifi") return "var(--wifi)";
    if(r.net_transport==="cellular"||r.net_transport==="ethernet") return "var(--cell)";
    return "var(--nonet)";
  }
  const legend=`<div class="legend">
    <span><span class="sw" style="background:var(--wifi)"></span>WiFi</span>
    <span><span class="sw" style="background:var(--cell)"></span>Celular</span>
    <span><span class="sw" style="background:var(--noint)"></span>Sin internet real</span>
    <span><span class="sw" style="background:var(--nonet)"></span>Sin red</span>
    <span><span class="sw" style="background:var(--gap)"></span>Sin señal</span>
  </div>`;
  histCharts.push({padT, plotH:bandH, hasDot:false});
  const inter=`
    <rect class="selrect" y="${padT}" height="${bandH}" x="0" width="0" fill="var(--accent)" opacity="0.2" visibility="hidden"/>
    <g class="xh" visibility="hidden">
      <line class="xline" x1="0" x2="0" y1="${padT}" y2="${padT+bandH}" stroke="var(--dim)" stroke-width="1" opacity="0.8" vector-effect="non-scaling-stroke"/>
    </g>`;

  const svg=`<svg class="hsvg" data-ci="${histCharts.length-1}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img">${rects}${tlabels}${inter}</svg>`;
  return `<div class="chart"><div class="clabel"><span class="t">Conectividad</span><span class="s">tipo de red a lo largo del tiempo</span></div>${svg}${legend}</div>`;
}

function findGaps(times,x0,x1){
  const gaps=[]; const ts=times.filter(t=>t).sort((a,b)=>a-b);
  if(ts.length===0){ return [[x0,x1]]; }
  if((ts[0]-x0)/60000>GAP_MIN) gaps.push([x0,ts[0]]);
  for(let i=1;i<ts.length;i++){ if((ts[i]-ts[i-1])/60000>GAP_MIN) gaps.push([ts[i-1]+15*60000,ts[i]]); }
  const last=ts[ts.length-1]+15*60000;
  if((x1-last)/60000>GAP_MIN) gaps.push([Math.min(last,x1),x1]);
  return gaps;
}
function niceTop(v){ if(v<=10)return 10; const mag=Math.pow(10,Math.floor(Math.log10(v))); const n=v/mag; const step=n<=1?1:n<=2?2:n<=5?5:10; return step*mag; }
function timeTicks(x0,x1){
  const span=x1-x0, ticks=[]; const n=5;
  for(let i=0;i<=n;i++) ticks.push(x0+span*i/n);
  return ticks;
}
function tickLabel(t,span){
  const d=new Date(t);
  if(span<=864e5) return timeFmt.format(d); // hh:mm
  if(span<=3*864e5) return dayTimeFmt.format(d); // dd/MM hh:mm (rangos de zoom intermedios)
  return new Intl.DateTimeFormat("es-AR",{timeZone:TZ,day:"2-digit",month:"2-digit"}).format(d);
}

async function loadFleet(silent){
  if(state.demo){ state.fleet=demoFleet(); state.lastRefresh=Date.now(); pulse(); if(state.view==="login")state.view="fleet"; render(); return; }
  if(!sb){ showBanner("No se pudo conectar con el servidor (Supabase). Verificá la conexión.","err"); return; }
  try{
    const {data,error}=await sb.from("fleet_status").select("*");
    if(error) throw error;
    state.fleet=data||[];
    state.lastRefresh=Date.now(); pulse();
    if(state.view!=="detail") state.view="fleet";
    render();
    if(state.view==="detail") { const r=state.fleet.find(x=>x.device_serial===state.device); if(r) renderDetail(); }
  }catch(e){
    console.warn(e);
    if(!silent) showBanner("No se pudieron cargar los datos de la flota. "+(e.message||""),"err");
  }
  loadDeviceNames();
  loadTrackingMap();
}

async function loadDeviceNames(){
  if(state.demo || !sb) return;
  try{
    // Pedir SOLO los nombres de los seriales en pantalla: la tabla devices puede
    // superar el limite de 1000 filas por consulta de Supabase (aprendido con 1204
    // dispositivos: el select sin filtro devolvia un subconjunto cambiante).
    const serials=(state.fleet||[]).map(r=>r.device_serial).filter(Boolean);
    if(!serials.length) return;
    const {data,error}=await sb.from("devices").select("device_serial,device_name").in("device_serial",serials);
    if(error) throw error;
    state.deviceNames=new Map((data||[]).map(d=>[d.device_serial,d.device_name]));
    render();
  }catch(e){
    console.warn("No se pudieron cargar los nombres de dispositivo:",e);
  }
}

async function loadTrackingMap(){
  if(state.demo || !sb) return;
  try{
    // Mismo approach que loadDeviceNames: sólo los seriales en pantalla, para no
    // pisar el límite de filas por consulta de Supabase.
    const serials=(state.fleet||[]).map(r=>r.device_serial).filter(Boolean);
    if(!serials.length) return;
    const {data,error}=await sb.from("device_tracking")
      .select("device_serial,usuario_smoc,cuadrilla,numero,yacimiento,proveedor,celular")
      .in("device_serial",serials);
    if(error) throw error;
    state.trackingMap=new Map((data||[]).map(d=>[d.device_serial,d]));
    render();
  }catch(e){
    console.warn("No se pudo cargar Seguimiento de la flota:",e);
  }
}

async function loadHistory(){
  if(state.demo){ state.history=demoHistory(state.device,rangeMs()); state.histLoading=false; renderHistory(); return; }
  if(!sb){ state.history=[]; state.histLoading=false; renderHistory(); return; }
  try{
    const cutoff=new Date(Date.now()-rangeMs()).toISOString();
    const cols="received_at,reported_at,app_version_name,battery_pct,battery_charging,battery_plugged,battery_temp_c,net_transport,net_validated,wifi_rssi_dbm,cell_level,airplane_mode,points_pending,oldest_pending_age_s,points_sent_48h,last_sync_ok,last_sync_error,storage_free_mb,ram_free_mb,ram_low,standby_bucket,location_enabled";
    // ascending:false — si la tablet supera el límite de 3000 filas en el
    // rango, PostgREST debe descartar las MÁS VIEJAS y quedarse con las
    // últimas. Los consumidores de este array (gráficos y tabla cruda)
    // ya hacen su propio sort local, así que el orden de entrega no les afecta.
    const {data,error}=await sb.from("heartbeats").select(cols)
      .eq("device_serial",state.device).gte("received_at",cutoff)
      .order("received_at",{ascending:false}).limit(3000);
    if(error) throw error;
    state.history=data||[];
  }catch(e){
    console.warn(e); state.history=[];
    showBanner("No se pudo cargar el historial. "+(e.message||""),"err");
  }
  state.histLoading=false; renderHistory();
}

function initTheme(){
  const stored=localStorage.getItem("flota_theme");
  if(stored==="light"||stored==="dark"){ document.documentElement.setAttribute("data-theme",stored); return; }
  const hour=new Date().getHours();

/* ---- historial: hover (crosshair + tooltip) ---- */
const tipFmt=new Intl.DateTimeFormat("es-AR",{timeZone:TZ,weekday:"short",day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false});

function histSvgs(){ return document.querySelectorAll("#histArea svg.hsvg"); }
function histPxToT(svg,clientX){
  const rect=svg.getBoundingClientRect();
  const vx=(clientX-rect.left)/rect.width*CH_W;
  const t=histX0+((vx-CH_PADL)/CH_PLOTW)*(histX1-histX0);
  return Math.max(histX0,Math.min(histX1,t));
}
function histTToVx(t){ return CH_PADL+((t-histX0)/(histX1-histX0))*CH_PLOTW; }
function histNearest(t){
  if(!histPts.length) return null;
  let lo=0,hi=histPts.length-1;
  while(hi-lo>1){ const m=(lo+hi)>>1; if(histPts[m].t<t)lo=m; else hi=m; }
  return (Math.abs(histPts[lo].t-t)<=Math.abs(histPts[hi].t-t))?histPts[lo]:histPts[hi];
}
function histGapAt(t){ return histGaps.find(g=>t>g[0]&&t<g[1])||null; }

function histShowCross(t,point){
  const vx=histTToVx(point?point.t:t);
  histSvgs().forEach(svg=>{
    const meta=histCharts[+svg.dataset.ci]; if(!meta) return;
    const xh=svg.querySelector(".xh"); if(!xh) return;
    xh.setAttribute("visibility","visible");
    const line=svg.querySelector(".xline");
    line.setAttribute("x1",vx); line.setAttribute("x2",vx);
    if(meta.hasDot){
      const dot=svg.querySelector(".xdot");
      const v=point?meta.get(point.r):null;
      if(point&&v!=null){
        const y=meta.padT+(1-((Number(v)-meta.yMin)/(meta.yMax-meta.yMin||1)))*meta.plotH;
        dot.setAttribute("cx",vx); dot.setAttribute("cy",y); dot.setAttribute("visibility","visible");
      }else dot.setAttribute("visibility","hidden");
    }
  });
  histHover=true;
}
function histHideCross(){
  if(!histHover) return;
  histSvgs().forEach(svg=>{ const xh=svg.querySelector(".xh"); if(xh) xh.setAttribute("visibility","hidden"); });
  document.getElementById("histTip").style.display="none";
  histHover=false;
}

function histShowTip(ev,t){
  const tip=document.getElementById("histTip");
  const g=histGapAt(t);
  if(g){
    tip.innerHTML=`<div class="tdate">Sin latidos en este período</div>
      <div class="tgap">de <b>${esc(dayTimeFmt.format(new Date(g[0])))}</b><br>a <b>${esc(dayTimeFmt.format(new Date(g[1])))}</b></div>`;
    histShowCross(t,null);
  }else{
    const p=histNearest(t);
    if(!p){ histHideCross(); return; }
    const r=p.r;
    const batt=isNil(r.battery_pct)?"—":r.battery_pct+"%"+(r.battery_charging?" ⚡":"");
    const pend=isNil(r.points_pending)?"—":r.points_pending;
    const sync=isNil(r.last_sync_ok)?'<span class="v">—</span>':(r.last_sync_ok?'<span class="v" style="color:var(--ok-text)">OK</span>':'<span class="v" style="color:var(--crit-text)">falló</span>');
    tip.innerHTML=`<div class="tdate">${esc(tipFmt.format(new Date(p.t)))}</div>
      <div class="trow"><span class="k">Batería</span><span class="v">${esc(batt)}</span></div>
      <div class="trow"><span class="k">Red</span><span class="v">${esc(netLabel(r))}</span></div>
      <div class="trow"><span class="k">Pendientes</span><span class="v">${esc(String(pend))}</span></div>
      <div class="trow"><span class="k">Envío</span>${sync}</div>`;
    histShowCross(t,p);
  }
  tip.style.display="block";
  const tw=tip.offsetWidth, m=14;
  let left=ev.clientX+m;
  if(left+tw>window.innerWidth-8) left=ev.clientX-m-tw;
  tip.style.left=left+"px";
  tip.style.top=Math.max(8,Math.min(window.innerHeight-tip.offsetHeight-8,ev.clientY-20))+"px";
}

function histShowSel(tA,tB){
  const xa=histTToVx(Math.min(tA,tB)), xb=histTToVx(Math.max(tA,tB));
  histSvgs().forEach(svg=>{
    const sr=svg.querySelector(".selrect"); if(!sr) return;
    sr.setAttribute("x",xa); sr.setAttribute("width",Math.max(0,xb-xa));
    sr.setAttribute("visibility","visible");
  });
}
function histHideSel(){
  histSvgs().forEach(svg=>{ const sr=svg.querySelector(".selrect"); if(sr) sr.setAttribute("visibility","hidden"); });
}

document.addEventListener("pointerdown",ev=>{
  if(ev.button!==0) return; // solo botón principal: click derecho/medio no arrastran
  if(!(ev.target instanceof Element)) return;
  const svg=ev.target.closest("#histArea svg.hsvg"); if(!svg) return;
  histDrag={px:ev.clientX, tA:histPxToT(svg,ev.clientX), moved:false};
});
document.addEventListener("pointerup",ev=>{
  if(!histDrag) return;
  const anySvg=document.querySelector("#histArea svg.hsvg");
  const tB=anySvg?histPxToT(anySvg,ev.clientX):histDrag.tA;
  const moved=histDrag.moved, tA=histDrag.tA;
  histDrag=null; histHideSel();
  if(moved){
    const t0=Math.min(tA,tB), t1=Math.max(tA,tB);
    if(t1-t0>=10*60000){ state.zoom={t0,t1}; renderHistory(); } // zoom mínimo 10 min
  }else if(anySvg){
    histShowTip(ev,tB); // clic/tap simple: posiciona crosshair + tooltip (único camino en touch)
  }
});
// si el gesto se interrumpe (soltar fuera de la ventana, alt-tab, touch cancelado), limpiar
function histCancelDrag(){ if(histDrag){ histDrag=null; histHideSel(); } }
document.addEventListener("pointercancel",histCancelDrag);
window.addEventListener("blur",histCancelDrag);

document.addEventListener("pointermove",ev=>{
  const svg=(ev.target instanceof Element)?ev.target.closest("#histArea svg.hsvg"):null;
  if(histDrag){
    const anySvg=svg||document.querySelector("#histArea svg.hsvg");
    if(!anySvg){ histDrag=null; return; }
    const tB=histPxToT(anySvg,ev.clientX);
    if(Math.abs(ev.clientX-histDrag.px)>5){ // <5px = clic, no zoom
      histDrag.moved=true;
      histHideCross();
      histShowSel(histDrag.tA,tB);
    }
    return;
  }
  if(!svg){ histHideCross(); return; }
  histShowTip(ev,histPxToT(svg,ev.clientX));
});

/* ============================================================
   DATOS DE EJEMPLO (solo para previsualizar sin conexión)
   ============================================================ */
function rng(seed){ let s=seed>>>0; return ()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }
function hashStr(str){ let h=2166136261; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
let _demoCache=null;
function demoFleet(){
  const now=Date.now();
  const versions=["3.4.1","3.4.1","3.4.0","3.3.8","3.4.1"];
  const list=[]; const N=46;
  for(let i=1;i<=N;i++){
    const serial="SM-T870-"+String(i).padStart(4,"0");
    const rnd=rng(hashStr(serial)+7);
    // perfil de problema
    const roll=rnd();
    let ageMin;
    if(roll<0.10) ageMin=60+rnd()*300;       // sin señal (crítica)
    else if(roll<0.20) ageMin=35+rnd()*24;   // atención por señal
    else ageMin=rnd()*14;                     // reciente
    const recv=new Date(now-ageMin*60000).toISOString();
    const charging=rnd()<0.35;
    let batt=Math.round(10+rnd()*90);
    if(roll>=0.86&&roll<0.90) batt=Math.round(4+rnd()*10); // batería crítica
    const transport=rnd()<0.7?"wifi":(rnd()<0.85?"cellular":"none");
    const validated= transport==="none"?false:(rnd()<0.82);
    const pending= roll<0.30? Math.round(rnd()*80) : Math.round(rnd()*8);
    const syncOk= roll<0.08? false : (rnd()<0.95);
    const storageFree= rnd()<0.07? Math.round(rnd()*450) : Math.round(1500+rnd()*40000);
    const locEnabled= rnd()<0.05? false : true;
    const managed= rnd()<0.04? false : true;
    const bucket= rnd()<0.12? (rnd()<0.5?"rare":"restricted") : (rnd()<0.5?"active":"working_set");
    const optExempt= rnd()<0.15? false : true;
    const nl = rnd()<0.06; // algunos NULL
    list.push({
      device_serial:serial,
      app_version_name:versions[i%versions.length], app_version_code:340+ (i%5),
      received_at:recv, reported_at: now-ageMin*60000 - Math.round(rnd()*20000),
      battery_pct: nl?null:batt, battery_charging: nl?null:charging,
      battery_plugged: charging?(rnd()<0.7?"ac":"usb"):"none",
      battery_temp_c: nl?null: (rnd()<0.1? 46+rnd()*6 : 24+rnd()*18),
      battery_voltage_mv: nl?null: Math.round(3700+rnd()*500),
      net_transport: transport, net_validated: transport==="none"?false:validated,
      wifi_rssi_dbm: transport==="wifi"? Math.round(-40-rnd()*50): null,
      wifi_ssid: transport==="wifi" ? ["YAC-Norte-WiFi","Base-Central","YAC-Sur-2G"][Math.floor(rnd()*3)] : null,
      cell_level: transport==="cellular"? Math.round(rnd()*4): (rnd()<0.5?Math.round(rnd()*4):null),
      airplane_mode:false,
      location_enabled: locEnabled, last_fix_accuracy_m: locEnabled? Math.round(4+rnd()*40):null,
      last_fix_age_s: locEnabled? Math.round(rnd()*1800): null,
      last_fix_lat_approx: locEnabled&&rnd()<0.85? Math.round((-38-rnd()*15)*100)/100 : null,
      last_fix_lon_approx: locEnabled&&rnd()<0.85? Math.round((-58-rnd()*12)*100)/100 : null,
      storage_free_mb: storageFree, storage_total_mb: 64000, ram_free_mb: Math.round(400+rnd()*2600),
      ram_low: rnd()<0.06, boot_time: now - Math.round(rnd()*10)*864e5,
      android_version: rnd()<0.5?"13":"12", security_patch:"2026-05-01",
      points_pending: nl?null:pending, oldest_pending_age_s: pending>0? Math.round(pending*900*(0.5+rnd())):0,
      points_sent_48h: Math.round(rnd()*300), last_sync_ok: syncOk,
      last_sync_error: syncOk?null:(rnd()<0.5?"partial_failure":"auth_failure"),
      last_sync_at: syncOk? now-Math.round(rnd()*30)*60000 : now-Math.round(60+rnd()*300)*60000,
      standby_bucket:bucket, battery_optimization_exempt:optExempt,
      power_save_mode: rnd()<0.1, managed_config_ok:managed, location_permission_ok: rnd()<0.04?false:true,
    });
  }
  return list;
}
function demoHistory(serial,span){
  const now=Date.now(), rnd=rng(hashStr(serial)+3);
  const out=[]; const step=15*60000; const n=Math.floor(span/step);
  let batt=40+Math.round(rnd()*50); let pend=Math.round(rnd()*5); let charging=false;
  const problem = rnd()<0.4; // sube pendientes
  for(let i=n;i>=0;i--){
    const t=now-i*step;
    // huecos: saltear algunas ventanas
    if(rnd()<0.06) continue;
    if(rnd()<0.04){ // hueco largo
      const skip=2+Math.floor(rnd()*6); i-=skip; if(i<0)i=0; continue;
    }
    // batería ciclo carga/descarga
    if(batt<25 && rnd()<0.6) charging=true;
    if(batt>92) charging=false;
    batt += charging? (2+rnd()*4) : -(0.5+rnd()*2.5);
    batt=Math.max(5,Math.min(100,batt));
    // pendientes
    if(problem){ pend += rnd()<0.7? Math.round(rnd()*4):0; if(rnd()<0.05) pend=Math.round(pend*0.2); }
    else { pend = rnd()<0.3?Math.round(rnd()*6):Math.max(0,pend-Math.round(rnd()*3)); }
    const transport = rnd()<0.75?"wifi":(rnd()<0.6?"cellular":"none");
    out.push({
      received_at:new Date(t).toISOString(), reported_at:t-Math.round(rnd()*15000),
      app_version_name:"3.4.1",
      battery_pct:Math.round(batt), battery_charging:charging, battery_plugged:charging?"ac":"none",
      battery_temp_c: 24+rnd()*16, net_transport:transport,
      net_validated: transport==="none"?false:(rnd()<0.85),
      wifi_rssi_dbm: transport==="wifi"?Math.round(-40-rnd()*45):null,
      wifi_ssid: transport==="wifi" ? ["YAC-Norte-WiFi","Base-Central","YAC-Sur-2G"][Math.floor(rnd()*3)] : null,
      cell_level: transport==="cellular"?Math.round(rnd()*4):null, airplane_mode:false,
      points_pending:Math.max(0,Math.round(pend)), oldest_pending_age_s:pend*900,
      points_sent_48h:Math.round(rnd()*200), last_sync_ok: rnd()<0.9, last_sync_error:null,
      storage_free_mb:Math.round(2000+rnd()*30000), ram_free_mb:Math.round(500+rnd()*2000),
      ram_low:false, standby_bucket:"active", location_enabled:true,
    });
  }
  return out;
}
