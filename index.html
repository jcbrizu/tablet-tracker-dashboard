<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Monitoreo de flota · Tablets de campo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ---------- Design tokens · paleta de marca Axion Energy (acento magenta) ----------
     El acento pasa a magenta Axion; el verde de Axion se deja afuera a propósito para
     no competir con el verde "OK" del semáforo. El semáforo (crit/warn/ok) NO son
     colores de marca: son funcionales. Se conservan las variables *-text / panel3 /
     border-strong / nodata* / wifi-cell-noint-nonet-gap / shadow que el resto del CSS
     ya referencia. */
  :root{
    --bg:#e5e8eb; --panel:#ffffff; --panel2:#f7f9fa; --panel3:#eef1f3;
    --border:#dce1e5; --border2:#eef1f3; --border-strong:#c2cad1;
    --text:#14181c; --dim:#5a646e; --faint:#8b95a0;
    --accent:#9e1e62; --accent-ink:#7a1a4d; --accent-bg:#f6dae7;
    --accent-weak:#f6dae7; --accent-text:#7a1a4d;
    --crit:#c4342f; --crit-bg:#fae7e6; --crit-text:#8f2020; --crit-tint:rgba(196,52,47,.045);
    --warn:#a15a0a; --warn-bg:#f5ecdd; --warn-text:#875607; --warn-tint:rgba(161,90,10,.05);
    --ok:#1c8457; --ok-bg:#e2f0e9; --ok-text:#166b46;
    --nodata:#7a848c; --nodata-bg:#e7eaed;
    --chip:#eef1f3; --track:#eceff1; --track-neutral:#c2c9ce; --input:#f2f4f6;
    --wifi:#2f7d78; --cell:#3a5bd0; --noint:#c07a12; --nonet:#b6bdc3; --gap:#c9cfd5;
    --shadow:0 1px 2px rgba(0,0,0,.06),0 1px 1px rgba(0,0,0,.04);
    --mono:'IBM Plex Mono',"SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,"Segoe UI",system-ui,sans-serif;
  }
  html[data-theme="dark"]{
    --bg:#0c1013; --panel:#151b21; --panel2:#11171d; --panel3:#212a31;
    --border:#263038; --border2:#212a31; --border-strong:#38444e;
    --text:#e6ebef; --dim:#98a2ac; --faint:#616d76;
    --accent:#ec008b; --accent-ink:#f06cb4; --accent-bg:#3a1730;
    --accent-weak:#3a1730; --accent-text:#f06cb4;
    --crit:#f0716b; --crit-bg:#3a1917; --crit-text:#f0a4a4; --crit-tint:rgba(240,113,107,.07);
    --warn:#e0a020; --warn-bg:#332a12; --warn-text:#f0c579; --warn-tint:rgba(224,160,32,.06);
    --ok:#3fbd85; --ok-bg:#132a20; --ok-text:#7ed3a9;
    --nodata:#8b959d; --nodata-bg:#232c33;
    --chip:#242e36; --track:#242e36; --track-neutral:#3f4b54; --input:#0c1013;
    --wifi:#2f9d95; --cell:#6f96e8; --noint:#d69a2e; --nonet:#5b6771; --gap:#2c363f;
    --shadow:0 1px 2px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--sans); background:var(--bg); color:var(--text);
    font-size:14px; line-height:1.4; -webkit-font-smoothing:antialiased;
    font-variant-numeric:tabular-nums;
  }
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  .mono{font-family:var(--mono)}
  .dim{color:var(--dim)}
  .faint{color:var(--faint)}
  .hidden{display:none!important}
  a{color:var(--accent);text-decoration:none}
  a:hover{color:var(--accent-text);text-decoration:underline}

  /* ---------- App chrome ---------- */
  .topbar{
    display:flex;align-items:center;gap:14px;height:52px;padding:0 22px;
    background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:11px;font-weight:600;font-size:15px;letter-spacing:-.01em}
  .brand .glyph{width:26px;height:26px;border-radius:7px;background:var(--accent);position:relative;flex:0 0 auto}
  .brand .glyph::after{content:"";position:absolute;top:50%;left:50%;width:11px;height:11px;transform:translate(-50%,-50%);border:2.5px solid #fff;border-radius:50%}
  .brand small{font-weight:400;color:var(--dim);letter-spacing:0}
  .brand-count{font-weight:400;color:var(--dim);letter-spacing:0}
  .brand-count:empty{display:none}
  .demo-banner{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:7px 16px;background:var(--warn-bg);color:var(--warn-text);
    font-weight:600;font-size:12.5px;border-bottom:1px solid var(--border-strong);
  }
  .topbar .spacer{flex:1}
  .iconbtn{
    display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 12px;
    background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--dim);
    font-size:12.5px;font-weight:500;
  }
  .iconbtn:hover{border-color:var(--border-strong);background:var(--panel3);color:var(--text)}
  .refresh-note{font-size:12.5px;color:var(--dim);display:flex;align-items:center;gap:7px}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 var(--ok)}
  .pulse.on{animation:pulse 1.1s ease-out}
  @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in oklab,var(--ok) 60%,transparent)}100%{box-shadow:0 0 0 7px transparent}}

  .wrap{max-width:1500px;margin:0 auto;padding:16px}

  /* ---------- Summary cards (KPI jerarquizados) ---------- */
  .cards{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:11px;margin-bottom:12px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:16px 18px}
  .card.clickable{cursor:pointer;user-select:none}
  .card.clickable:hover{border-color:var(--border-strong)}
  .card.clickable.active{box-shadow:inset 0 0 0 2px var(--accent)}
  .kpi-lbl{display:flex;align-items:center;gap:7px;font:600 11px/1 var(--mono);letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
  .kpi-num{font:600 30px/1 var(--mono);letter-spacing:-.01em;margin-top:8px}
  .kpi-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  /* Atención = dominante */
  .kpi-crit{background:var(--crit);border-color:transparent;color:#fff;box-shadow:0 1px 3px rgba(196,52,47,.28)}
  .kpi-crit .kpi-lbl{color:#fff;opacity:.92}
  .kpi-crit .kpi-dot{background:#fff}
  .kpi-crit .kpi-num{font-size:40px}
  .kpi-crit.clickable:hover{border-color:transparent;filter:brightness(1.04)}
  .kpi-crit.clickable.active{box-shadow:inset 0 0 0 3px rgba(255,255,255,.75)}
  .kpi-warn .kpi-lbl{color:var(--warn)}
  .kpi-ok .kpi-lbl{color:var(--ok)}
  .kpi-stale .kpi-lbl{color:var(--faint)}

  /* ---------- Toolbar (panel pegado a la tabla) ---------- */
  .toolbar{
    display:flex;flex-wrap:wrap;gap:10px;align-items:center;
    background:var(--panel);border:1px solid var(--border);border-bottom:none;
    border-radius:11px 11px 0 0;padding:11px 14px;margin-bottom:0;
  }
  .search{position:relative;flex:1;min-width:200px;max-width:340px}
  .search input{
    width:100%;height:34px;padding:0 12px 0 32px;border:1px solid var(--border);border-radius:8px;
    background:var(--input);color:var(--text);font-size:13px;
  }
  .search input:focus{outline:none;border-color:var(--accent)}
  .search .mag{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;border:2px solid var(--faint);border-radius:50%}
  .search .mag::after{content:"";position:absolute;width:6px;height:2px;background:var(--faint);transform:rotate(45deg);right:-4px;bottom:-1px}
  .segmented{display:inline-flex;gap:4px;border:none;border-radius:8px;background:var(--input);padding:3px}
  .segmented button{
    border:none;background:transparent;color:var(--dim);height:auto;padding:6px 11px;font-size:12.5px;font-weight:500;
    border-radius:6px;display:flex;align-items:center;gap:6px;
  }
  .segmented button.on{background:var(--panel);color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .segmented .dot{width:8px;height:8px;border-radius:50%}
  .dot-crit{background:var(--crit)} .dot-warn{background:var(--warn)} .dot-ok{background:var(--ok)}
  .ugfilter{display:inline-flex;align-items:center;gap:6px}
  .ugfilter label{font-size:12px;color:var(--dim);font-weight:600}
  .ugfilter select{
    height:34px;padding:0 10px;border:1px solid var(--border);border-radius:8px;
    background:var(--input);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;
  }
  .ugfilter select:focus{outline:none;border-color:var(--accent)}

  /* ---------- Table ---------- */
  /* overflow:clip (no hidden): hidden crea un scroll container y el thead sticky
     se "pega" dentro de la tarjeta, desplazado 52px, tapando filas. clip recorta
     las esquinas igual pero deja al sticky referenciar el viewport. */
  .tablewrap{background:var(--panel);border:1px solid var(--border);border-radius:0 0 11px 11px;overflow:clip;box-shadow:var(--shadow)}
  #fleetMap{width:100%;height:65vh}
  /* Tooltip enriquecido del mapa. Colores fijos (Leaflet lo pinta blanco en
     ambos temas), para legibilidad en claro y oscuro. */
  .leaflet-tooltip.fleet-tip{white-space:normal;min-width:210px;max-width:360px;padding:8px 11px}
  .fleet-tip .mtip-name{font-weight:700;color:#14181c;white-space:nowrap}
  .fleet-tip .mtip-status{margin-top:1px;color:#3a4149}
  .fleet-tip .mtip-sep{height:1px;background:#e2e6ea;margin:7px 0}
  .fleet-tip .mtip-row{display:flex;justify-content:space-between;gap:18px;font-size:12px;line-height:1.6}
  .fleet-tip .mtip-row span{color:#6b7680;white-space:nowrap}
  .fleet-tip .mtip-row b{font-weight:600;font-family:var(--mono);color:#14181c;white-space:nowrap;text-align:right}
  .offmap-caption{font-size:12px;color:var(--faint);margin:10px 2px 0}
  .fleet-caption{font-size:12px;color:var(--faint);margin:10px 2px 0;padding-left:2px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{
    text-align:left;font:600 10.5px/1 var(--mono);letter-spacing:.07em;text-transform:uppercase;color:var(--faint);
    padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel2);position:sticky;top:52px;z-index:5;
    white-space:nowrap;
  }
  thead th.sortable{cursor:pointer;user-select:none}
  thead th.sortable:hover{color:var(--dim)}
  thead th .arrow{font-size:9px;opacity:.7;margin-left:3px}
  tbody td{padding:8px 12px;border-bottom:1px solid var(--border2);vertical-align:middle;white-space:nowrap}
  tbody tr{cursor:pointer}
  tbody tr:last-child td{border-bottom:none}
  .serialcell{display:flex;flex-direction:column;gap:2px}
  .serial{font:600 13px/1.25 var(--mono);letter-spacing:-.2px}
  .serial-name{font-size:11.5px;color:var(--dim);font-weight:400}

  /* Rail de severidad (border-left) + tinte de fila = reflejan el semáforo. */
  .fleettbl tbody tr>td:first-child{border-left:3px solid transparent}
  .fleettbl tbody tr.rowcrit>td:first-child{border-left-color:var(--crit)}
  .fleettbl tbody tr.rowwarn>td:first-child{border-left-color:var(--warn)}
  .fleettbl tbody tr.rowcrit>td{background:var(--crit-tint)}
  .fleettbl tbody tr.rowwarn>td{background:var(--warn-tint)}

  /* Fila de flota: rowA (datos). Si hay ficha, rowB (chips) va debajo, misma fila
     visual. Sin ficha → rowA.solo (con borde inferior propio, sin rowB). */
  .fleettbl tbody tr.rowA>td{padding:11px 12px;border-bottom:none}
  .fleettbl tbody tr.rowA.solo>td{border-bottom:1px solid var(--border2)}
  .fleettbl tbody tr.rowB>td.trackcell{padding:0 12px 11px;white-space:normal}
  /* Hover agrupado: JS agrega/saca .hoverpair en rowA+rowB juntas. */
  .fleettbl tbody tr.hoverpair>td{background:var(--panel2)}

  .grouptbl tbody td{padding:13px 12px;border-bottom:1px solid var(--border2)}
  .grouptbl tbody tr:last-child td{border-bottom:none}
  .grouptbl tbody tr.grp-flagged>td{background:var(--crit-tint)}
  .grouptbl tbody tr.grp-muted>td{opacity:.6}
  .grp-name{font-weight:600;font-size:13.5px}
  .grp-salud{min-width:180px}
  .grp-bar{display:flex;height:7px;border-radius:4px;overflow:hidden;background:var(--panel3);margin-bottom:5px}
  .grp-bar span{display:block;height:100%}
  .grp-ok{background:var(--ok)} .grp-warn{background:var(--warn)} .grp-crit{background:var(--crit)}
  .grp-legend{font-family:var(--mono);font-size:12px;color:var(--dim);display:flex;gap:12px}
  .grp-legend b{font-weight:600}
  .grp-l-ok{color:var(--ok-text)} .grp-l-warn{color:var(--warn-text)} .grp-l-crit{color:var(--crit-text)}
  .grp-hit{font-family:var(--mono);font-size:13px;color:var(--dim)}
  .grp-hit.on{color:var(--crit-text);font-weight:600;background:var(--crit-bg);padding:5px 10px;border-radius:7px}
  .grp-caption{padding:10px 14px 0;font-size:12.5px;color:var(--dim)}
  .grouptbl tbody tr.grp-row{cursor:pointer}
  .grouptbl tbody tr.grp-row:hover>td{background:var(--panel2)}
  .filter-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--accent-text);background:var(--accent-bg);padding:4px 6px 4px 12px;border-radius:20px}
  .filter-chip .chip-x{border:none;background:transparent;color:var(--accent-text);cursor:pointer;font-size:13px;line-height:1;padding:1px 5px;border-radius:50%;font-family:inherit}
  .filter-chip .chip-x:hover{background:var(--accent-weak)}

  .statuscell{display:flex;align-items:center;gap:9px;min-width:0}
  .tagbadge{font:600 10px/1 var(--mono);letter-spacing:.05em;text-transform:uppercase;padding:4px 6px;border-radius:4px;flex:none}
  .tb-crit{color:var(--crit);background:var(--crit-bg)}
  .tb-warn{color:var(--warn);background:var(--warn-bg)}
  .tb-ok{color:var(--ok);background:var(--ok-bg)}
  .tb-nodata{color:var(--dim);background:var(--nodata-bg)}
  .motivo{font-weight:500;font-size:13.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .motivo.ok{color:var(--dim)}
  .seg-ghost{font-size:11.5px;color:var(--faint);opacity:.7;flex:none}
  .trackchips{display:flex;gap:7px;flex-wrap:wrap}
  .tchip{font-size:11.5px;color:var(--text);background:var(--chip);padding:3px 10px;border-radius:20px}
  .tchip .k{color:var(--faint)}

  /* ---------- Badge (pill · usado en el detalle) ---------- */
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:13px;font-weight:600;line-height:1.4}
  .badge .ic{width:8px;height:8px;flex:0 0 auto;border-radius:50%;font-size:0}
  .b-crit{background:var(--crit-bg);color:var(--crit)} .b-crit .ic{background:var(--crit)}
  .b-warn{background:var(--warn-bg);color:var(--warn)} .b-warn .ic{background:var(--warn)}
  .b-ok{background:var(--ok-bg);color:var(--ok)} .b-ok .ic{background:var(--ok)}
  .b-nodata{background:var(--nodata-bg);color:var(--dim)} .b-nodata .ic{background:var(--nodata)}
  .reason{font-weight:600}
  .reason.r-crit{color:var(--crit-text)} .reason.r-warn{color:var(--warn-text)} .reason.r-ok{color:var(--dim);font-weight:400}
  .cellstack{display:flex;align-items:center;gap:8px}

  /* battery microbar */
  .batt{display:inline-flex;align-items:center;gap:8px}
  .battbar{width:44px;height:7px;border-radius:4px;background:var(--track);overflow:hidden;display:inline-block;flex:none}
  .battfill{display:block;height:100%}
  .battpct{font:600 12.5px/1 var(--mono)}
  .battpct.null{color:var(--faint)}
  .chg{color:var(--ok);font-size:11px}
  .netcell{display:inline-flex;align-items:center;gap:7px}
  .nettag{display:inline-flex;align-items:center;gap:5px;font-size:12.5px}
  .netdot{width:8px;height:8px;border-radius:50%}
  .pend{font:600 13px/1 var(--mono);color:var(--dim)}
  .pend.hi{color:var(--warn)} .pend.crit{color:var(--crit)}
  .edited{color:var(--warn);cursor:default}

  /* ---------- Detail ---------- */
  .detail-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .back{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--dim);font-weight:500;font-size:13px}
  .back:hover{border-color:var(--border-strong);color:var(--text)}
  .detail-serial{margin:0;font:600 20px/1 var(--mono);letter-spacing:-.01em}
  .detail-name{font-weight:600;font-size:14px}
  .detail-sub{color:var(--dim);font-size:13px}

  /* Banner de diagnóstico (solo Atención / Observación) */
  .diag{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:20px 22px;margin-bottom:12px}
  .diag-over{display:flex;align-items:center;gap:7px;margin-bottom:12px;font:600 11px/1 var(--mono);letter-spacing:.09em;text-transform:uppercase}
  .diag-over .d{width:7px;height:7px;border-radius:50%;flex:none}
  .diag-main{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .diag-main .m{font-weight:600;font-size:22px;letter-spacing:-.01em}
  .diag-main .e{font-size:14px;color:var(--dim);max-width:64ch}
  .diag-chips{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  .diag-chip{border:1px solid var(--border);background:var(--panel2);border-radius:8px;padding:9px 13px}
  .diag-chip .k{font:600 10px/1 var(--mono);letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
  .diag-chip .v{font:600 15px/1 var(--mono);margin-top:5px}
  .ok-strip{background:var(--ok-bg);border:1px solid var(--border);border-radius:11px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  .ok-strip .d{width:9px;height:9px;border-radius:50%;background:var(--ok);flex:none}
  .ok-strip .t{font-weight:600;font-size:15px;color:var(--ok)}
  .ok-strip .s{font-size:13.5px;color:var(--dim)}

  .groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(232px,1fr));gap:11px;margin-bottom:12px}
  .group{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:15px 16px;position:relative}
  .group.culprit{border-width:1.5px}
  .culprit-tag{position:absolute;top:-8px;left:14px;font:600 9px/1 var(--mono);letter-spacing:.06em;text-transform:uppercase;color:#fff;padding:3px 7px;border-radius:4px}
  .group h3{margin:0 0 12px;font:600 10.5px/1 var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding:0;border:none;background:none}
  .mapcard{background:var(--panel);border:1px solid var(--border);border-radius:11px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
  .mapcard h3{margin:0;font:600 10.5px/1 var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding:14px 16px 0;border:none;background:none}
  .mapcard .mapbody{padding:12px 13px}
  .mapcard .mapcaption{font-size:11.5px;color:var(--dim);margin:0 0 8px}
  .mapcard iframe{display:block;width:100%;height:260px;border:1px solid var(--border);border-radius:6px}
  .mapcard .maplink{display:inline-block;margin-top:8px;font-size:12.5px}

  .battcond-head{font:600 10px/1 var(--mono);letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:12px 2px 6px;padding-top:10px;border-top:1px solid var(--border)}
  .battcond-msg{font-size:12.5px;color:var(--faint);padding:2px}

  /* ---------- Seguimiento (panel editable + historial) ---------- */
  .seg-body{display:flex;flex-direction:column;gap:12px}
  .seg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px 16px}
  .seg-field{display:flex;flex-direction:column;gap:7px}
  .seg-field label{font:600 10px/1 var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.05em}
  .seg-field input{height:38px;padding:0 11px;border:1px solid var(--border);border-radius:8px;background:var(--input);color:var(--text);font-size:13px}
  .seg-field input:focus{outline:none;border-color:var(--accent);background:var(--panel)}

/* ============================================================
   Utilidades de formato (AR / español / NULL)
   ============================================================ */
const TZ="America/Argentina/Buenos_Aires";
const dtFmt=new Intl.DateTimeFormat("es-AR",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false});
const dtFmtSec=new Intl.DateTimeFormat("es-AR",{timeZone:TZ,day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
const timeFmt=new Intl.DateTimeFormat("es-AR",{timeZone:TZ,hour:"2-digit",minute:"2-digit",hour12:false});
const dayTimeFmt=new Intl.DateTimeFormat("es-AR",{timeZone:TZ,day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false});

function isNil(v){ return v===null||v===undefined||v===""; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// Extrae la Unidad de Gestión (UG) codificada en el nombre del device:
// "TAB GSJ PETROSAR CP2216..." -> "GSJ". Nombres que no matchean -> null.
function ugOf(name){
  if(isNil(name)) return null;
  const m=String(name).trim().match(/^TAB\s+([A-ZÑÁÉÍÓÚ0-9]{2,5})\b/i);
  return m ? m[1].toUpperCase() : null;
}

function toDate(v){ // timestamptz string
  if(isNil(v)) return null;
  const d=new Date(v); return isNaN(d.getTime())?null:d;
}
function epochToDate(ms){
  if(isNil(ms)) return null;
  const n=Number(ms); if(!isFinite(n)||n<=0) return null;
  const d=new Date(n); return isNaN(d.getTime())?null:d;
}
function fmtDateTime(d){ return d?dtFmt.format(d):"—"; }
function fmtEpoch(ms){ const d=epochToDate(ms); return d?dtFmt.format(d):"—"; }

function minutesSince(d){ if(!d) return null; return (Date.now()-d.getTime())/60000; }

function relTime(d){
  if(!d) return "sin dato";
  let s=Math.floor((Date.now()-d.getTime())/1000);
  if(s<0) s=0;
  if(s<45) return "hace instantes";
  const m=Math.round(s/60);
  if(m<60) return "hace "+m+" min";
  const h=Math.floor(m/60), mr=m%60;
  if(h<24) return "hace "+h+" h"+(h<6&&mr>0?" "+mr+" min":"");
  const dd=Math.floor(h/24);
  return "hace "+dd+(dd===1?" día":" días");
}
function agePhrase(min){
  if(min<60) return "hace "+Math.round(min)+" min";
  const h=Math.floor(min/60);
  if(h<24) return "hace "+h+" h";
  return "hace "+Math.floor(h/24)+" días";
}
function fmtDur(sec){
  if(isNil(sec)) return "—";
  sec=Number(sec); if(!isFinite(sec)) return "—";
  if(sec<60) return Math.round(sec)+" s";
  const m=Math.floor(sec/60);
  if(m<60) return m+" min";
  const h=Math.floor(m/60), mr=m%60;
  if(h<24) return h+" h"+(mr?" "+mr+" min":"");
  return Math.floor(h/24)+" d";
}
function num(v,unit,dec){
  if(isNil(v)) return {t:"—",n:true};
  let n=Number(v); if(!isFinite(n)) return {t:"—",n:true};
  if(dec!=null) n=n.toFixed(dec);
  else n=n.toLocaleString("es-AR");
  return {t:n+(unit?" "+unit:""),n:false};
}
function boolTxt(v){ if(isNil(v)) return {t:"—",n:true}; return {t:v?"Sí":"No",n:false}; }
function boolSiNo(v){ if(isNil(v)) return ""; return v?"Sí":"No"; }
function fmtMB(v){
  if(isNil(v)) return {t:"—",n:true};
  const n=Number(v); if(!isFinite(n)) return {t:"—",n:true};
  if(n>=1024) return {t:(n/1024).toFixed(1)+" GB",n:false};
  return {t:Math.round(n).toLocaleString("es-AR")+" MB",n:false};
}

/* ============================================================
   Reglas de negocio — semáforo (peor gana), contra hora actual
   ============================================================ */
function evalStatus(r){
  const recv=toDate(r.received_at);
  const age=minutesSince(recv); // minutos desde la última señal
  const critical=[], warning=[];

  // ---- críticas ----
  if(age!=null && age>1440) critical.push("Sin señal "+agePhrase(age));
  if(r.location_enabled===false) critical.push("Ubicación apagada");
  if(r.location_permission_ok===false) critical.push("Sin permiso de ubicación");
  if(r.managed_config_ok===false) critical.push("Sin configuración corporativa");
  // null (sin dato de carga) se trata como "no cargando": preferimos falsa alarma a alerta perdida
  if(r.battery_pct!=null && r.battery_pct<15 && r.battery_charging!==true) critical.push("Batería "+r.battery_pct+"% (sin cargar)");
  if(r.storage_free_mb!=null && r.storage_free_mb<500) critical.push("Almacenamiento casi lleno");
  if(r.last_sync_ok===false) critical.push("No pudo enviar al GIS");

  // ---- atención ----
  if(age!=null && age>=360 && age<1440) warning.push("Sin señal "+agePhrase(age));
  if(r.points_pending!=null && r.points_pending>20) warning.push(r.points_pending+" puntos sin enviar");
  // 'rare' es esperable sin exención de batería; solo 'restricted' frena envíos de verdad
  if(r.standby_bucket==="restricted") warning.push("App restringida en 2.º plano");
  // exención de batería: fuera del semáforo mientras Knox/KPE no esté operativo (toda la flota da false, es esperado)
  if(r.net_validated===false) warning.push("Conectada sin internet");
  // null (sin dato de carga) se trata como "no cargando": preferimos falsa alarma a alerta perdida
  if(r.battery_pct!=null && r.battery_pct<30 && r.battery_charging!==true) warning.push("Batería "+r.battery_pct+"% (sin cargar)");
  if(r.battery_temp_c!=null && r.battery_temp_c>45) warning.push("Batería caliente ("+Math.round(r.battery_temp_c)+"°C)");

  let level="ok", reasons=[];
  if(critical.length){ level="critical"; reasons=critical; }
  else if(warning.length){ level="warning"; reasons=warning; }
  else reasons=["Todo en orden"];

  return {level, main:reasons[0], reasons, ageMin:age, recv};
}
const LEVEL_RANK={critical:0,warning:1,ok:2};

const FIELD_TIP = {

// Diagnóstico del detalle: mapea el motivo principal (s.main) a un panel "sospechoso"
// (app|bat|net|gps|sis) + explicación + 2-3 chips-métrica. Deriva del mismo dato que
// evalStatus. Devuelve {culprit:null,...} para OK o cuando no hay un único panel.
function diagnose(r,s){
  const m=s.main||"";
  const tm = s.recv?relTime(s.recv).replace(/^hace\s+/,""):"—";
  const P=(k,v,bad)=>({k,v:isNil(v)?"—":String(v),bad:!!bad});
  const pend=num(r.points_pending).t;
  if(s.level==="ok") return {culprit:null,explain:"",chips:[]};
  if(/^Sin señal/.test(m))
    return {culprit:null, explain:"La tablet no envía un latido de salud desde hace "+tm+". Puede estar apagada, sin datos o guardada.",
      chips:[P("Última señal",tm,true),P("Puntos pendientes",pend,false)]};
  if(/Batería/.test(m))
    return {culprit:"bat", explain:"La batería está en "+r.battery_pct+"% y la tablet no está cargando. Por debajo del 15% entra en Atención.",
      chips:[P("Nivel",r.battery_pct+"%",true),P("Cargando",boolSiNo(r.battery_charging)||"No",true),P("Última señal",tm,false)]};
  if(/permiso/i.test(m))
    return {culprit:"gps", explain:"La app perdió el permiso de ubicación: no puede geolocalizar ni reportar la zona al GIS.",
      chips:[P("Permiso de ubicación","No",true),P("Puntos pendientes",pend,true),P("Última señal",tm,false)]};
  if(/Ubicación apagada/i.test(m))
    return {culprit:"gps", explain:"El GPS del dispositivo está apagado. Sin ubicación activa no se generan puntos para enviar.",
      chips:[P("Ubicación activada","No",true),P("Última señal",tm,false)]};
  if(/sin internet/i.test(m))
    return {culprit:"net", explain:"La tablet está en una red pero sin salida real a internet: los puntos se acumulan sin llegar al GIS.",
      chips:[P("Internet real","No",true),P("Puntos pendientes",pend,true)]};
  if(/Almacenamiento/i.test(m))
    return {culprit:"sis", explain:"El almacenamiento está casi lleno; la app puede no poder guardar nuevos puntos.",
      chips:[P("Disco libre",fmtMB(r.storage_free_mb).t,true),P("Puntos pendientes",pend,true)]};
  if(/configuración corporativa/i.test(m))
    return {culprit:"app", explain:"La configuración corporativa (Intune) no está aplicada: la app puede no tener endpoint, intervalo o credenciales.",
      chips:[P("Config. corporativa OK","No",true),P("Última señal",tm,false)]};
  if(/restringida/i.test(m))
    return {culprit:"app", explain:"El sistema restringió la app en segundo plano: puede no capturar ni enviar hasta que se la vuelva a permitir.",
      chips:[P("App en 2.º plano","Restringida",true),P("Puntos pendientes",pend,false)]};
  // "No pudo enviar al GIS" / "N puntos sin enviar" y demás de app
  return {culprit:"app", explain:"El último envío no llegó al GIS y hay "+pend+" puntos acumulados sin enviar.",
    chips:[P("Último envío OK","No",true),P("Puntos pendientes",pend,true),P("Última señal",tm,false)]};
}

/* ============================================================
   Exportar CSV de la flota (vista Tabla/Mapa) — es-AR: separador ';',
   BOM UTF-8, CRLF. Único helper de escapado para todas las celdas.
   ============================================================ */
function csvCell(v){
  if(isNil(v)) return "";
  let s=String(v);
  // Anti formula-injection: Excel/Sheets ejecutan celdas que empiezan con
  // = + - @ (o tab/CR) como formula. Prefijamos ' para neutralizarlas.
  if(/^[=+\-@\t\r]/.test(s)) s="'"+s;
  if(/[;"\n\r]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function arDateStamp(d){
  // en-CA formatea como YYYY-MM-DD; se fuerza el huso AR para que la fecha
  // del nombre del archivo coincida con "hoy" en Argentina, no en UTC/local del browser.
  return new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit"}).format(d);
}
/* Intervalo: apps ≥ v40 reportan segundos exactos (report_interval_s);
   filas viejas solo minutos → se convierten ×60 para comparar en una
   sola unidad durante la convivencia v39/v40. */
function intervalSecsOf(r){
  const eff=!isNil(r.report_interval_s)?r.report_interval_s:(!isNil(r.report_interval_min)?r.report_interval_min*60:null);
  const intune=!isNil(r.intune_interval_s)?r.intune_interval_s:(!isNil(r.intune_interval_min)?r.intune_interval_min*60:null);
  return {eff,intune};
}
function fmtIntervalS(s){ return s%60===0?(s/60)+" min":s+" s"; }
const CSV_HEADERS=["Serial","Nombre","UG","Estado","Motivo","Última señal","Versión","Android","Parche de seguridad","Batería %","Cargando","Puntos pendientes","Intervalo (s)","Intervalo Intune (s)","Último envío OK","Detalle error","Cuadrilla","Yacimiento","Proveedor","Número","Celular","Usuario SMOC","Zona lat","Zona lon"];
function fleetRowToCsvCols({r,s}){
  const dname=state.deviceNames.get(r.device_serial);
  const trk=state.trackingMap.get(r.device_serial);
  const tv=(key)=> trk&&!isNil(trk[key])?trk[key]:"";
  return [
    r.device_serial||"",
    dname||"",
    ugOf(dname)||"",
    LEVEL_META[s.level].word,
    s.main||"",
    s.recv?dtFmt.format(s.recv):"",
    r.app_version_name||"",
    isNil(r.android_version)?"":String(r.android_version),
    r.security_patch||"",
    isNil(r.battery_pct)?"":r.battery_pct,
    boolSiNo(r.battery_charging),
    isNil(r.points_pending)?"":r.points_pending,
    intervalSecsOf(r).eff??"",
    intervalSecsOf(r).intune??"",
    boolSiNo(r.last_sync_ok),
    r.last_sync_error_detail||"",
    tv("cuadrilla"), tv("yacimiento"), tv("proveedor"), tv("numero"), tv("celular"), tv("usuario_smoc"),
    isNil(r.last_fix_lat_approx)?"":r.last_fix_lat_approx,
    isNil(r.last_fix_lon_approx)?"":r.last_fix_lon_approx,
  ];
}
function exportFleetCsv(list){
  const lines=[CSV_HEADERS, ...list.map(fleetRowToCsvCols)]
    .map(cols=>cols.map(csvCell).join(";"))
    .join("\r\n");
  const blob=new Blob(["\uFEFF"+lines],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`flota-tablet-tracker-${arDateStamp(new Date())}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ============================================================
   Iconos mínimos (rects/polígono simple)
   ============================================================ */
function batteryIcon(pct,charging){
  const p = isNil(pct)?null:Math.max(0,Math.min(100,Number(pct)));
  const w=26,h=13;
  const fillW = p==null?0:(w-4)*p/100;
  let col = "var(--ok)";
  if(p!=null){ if(p<15) col="var(--crit)"; else if(p<30) col="var(--warn)"; }
  else col="var(--faint)";
  const chg = charging===true;
  let bolt="";
  if(chg) bolt=`<polygon points="14,2.2 9.5,7.2 12.4,7.2 11,10.8 15.8,5.6 12.9,5.6" fill="var(--accent)" stroke="var(--panel)" stroke-width="0.6"/>`;
  return `<svg width="${w+4}" height="${h}" viewBox="0 0 ${w+4} ${h}" aria-hidden="true">
    <rect x="0.5" y="0.5" width="${w-1}" height="${h-1}" rx="2.5" fill="none" stroke="var(--border-strong)" stroke-width="1"/>
    <rect x="${w}" y="4" width="3" height="5" rx="1" fill="var(--border-strong)"/>
    ${p!=null?`<rect x="2" y="2" width="${fillW}" height="${h-4}" rx="1.2" fill="${col}"/>`:""}
    ${bolt}
  </svg>`;
}
// Microbarra de batería para la tabla de flota: ancho = % ; color SOLO bajo umbral
// (<15% crit, <30% warn, si no neutro). El % repite el mismo criterio de color.
function batteryBar(pct,charging){
  if(isNil(pct)) return `<span class="battbar"><span class="battfill" style="width:0"></span></span><span class="battpct null">—</span>`;
  const p=Math.max(0,Math.min(100,Number(pct)));
  const bad=p<15, warn=!bad&&p<30;
  const fill = bad?"var(--crit)":warn?"var(--warn)":"var(--track-neutral)";
  const col  = bad?"var(--crit)":warn?"var(--warn)":"var(--dim)";
  const chg  = charging===true?`<span class="chg" title="Cargando">⚡</span>`:"";
  return `<span class="battbar"><span class="battfill" style="width:${p}%;background:${fill}"></span></span><span class="battpct" style="color:${col}">${p}%</span>${chg}`;
}
function netDotColor(r){
  const t=r.net_transport;
  if(isNil(t)||t==="none") return "var(--nonet)";
  if(r.net_validated===false) return "var(--noint)";
  if(t==="wifi") return "var(--wifi)";
  if(t==="cellular") return "var(--cell)";
  if(t==="ethernet") return "var(--cell)";
  return "var(--nonet)";
}
function netLabel(r){
  const t=r.net_transport;
  if(isNil(t)) return "sin dato";
  if(t==="none") return "Sin red";
  if(r.airplane_mode===true) return "Modo avión";
  let base = t==="wifi"?"WiFi":t==="cellular"?"Celular":t==="ethernet"?"Cable":"Otro";
  if(t==="wifi" && r.wifi_rssi_dbm!=null) base += " "+r.wifi_rssi_dbm+"dBm";
  if(t==="cellular" && r.cell_level!=null) base += " ("+r.cell_level+"/4)";
  if(r.net_validated===false) base += " · sin internet";
  return base;
}

// bandera ⚠: el hecho se concentra en el grupo (más de la mitad y ≥2 equipos)
function groupFlagged(g){ return g.affected >= GROUP_FLAG_MIN && g.affected > g.total/2; }

// Agrupa `list` ({r,s}) por keyFn (nombre de grupo o null→catchAll).
// affectedFn(x) marca el "hecho" que cuenta la columna. Devuelve grupos ordenados.
function groupFleet(list, keyFn, affectedFn, catchAll){
  const map=new Map();
  list.forEach(x=>{
    const raw=keyFn(x);
    const name=(raw==null || String(raw).trim()==="") ? catchAll : String(raw);
    let g=map.get(name);
    if(!g){ g={name, ok:0, warn:0, crit:0, affected:0, muted:(name===catchAll)}; map.set(name,g); }
    if(x.s.level==="ok") g.ok++; else if(x.s.level==="warning") g.warn++; else g.crit++;
    if(affectedFn(x)) g.affected++;
  });
  const arr=[...map.values()].map(g=>({ ...g, total:g.ok+g.warn+g.crit }));
  return arr.sort((a,b)=>{
    if(a.muted!==b.muted) return a.muted?1:-1;         // catch-all siempre al final
    const fa=groupFlagged(a), fb=groupFlagged(b);
    if(fa!==fb) return fa?-1:1;                          // con bandera arriba
    return b.crit-a.crit;                               // desempate: más Atención primero
  });
}

function groupSaludCell(g){
  const t=g.total||1, w=n=>(n/t*100);
  return `<div class="grp-salud">
    <div class="grp-bar"><span class="grp-ok" style="width:${w(g.ok)}%"></span><span class="grp-warn" style="width:${w(g.warn)}%"></span><span class="grp-crit" style="width:${w(g.crit)}%"></span></div>
    <div class="grp-legend"><span class="grp-l-ok"><b>${g.ok}</b> OK</span><span class="grp-l-warn"><b>${g.warn}</b> Obs.</span><span class="grp-l-crit"><b>${g.crit}</b> Atención</span></div>
  </div>`;
}
function groupAffectedCell(g){
  if(g.affected===0) return `<span class="faint">—</span>`;
  const on=groupFlagged(g);
  return `<span class="grp-hit${on?' on':''}">${on?'⚠ ':''}${g.affected} de ${g.total}</span>`;
}
function groupTable(groups, nameHead, affHead, caption, gtype){
  const rows=groups.map(g=>`<tr class="grp-row ${groupFlagged(g)?'grp-flagged':''}${g.muted?' grp-muted':''}" data-gtype="${gtype}" data-gval="${esc(g.name)}" data-gcatch="${g.muted?'1':''}">
    <td><span class="grp-name mono">${esc(g.name)}</span></td>
    <td style="text-align:right"><span class="mono">${g.total}</span></td>
    <td>${groupSaludCell(g)}</td>
    <td>${groupAffectedCell(g)}</td>
  </tr>`).join("");
  return `<div class="tablewrap"><table class="fleettbl grouptbl">
    <thead><tr><th>${esc(nameHead)}</th><th style="text-align:right">Equipos</th><th>Salud</th><th>${esc(affHead)}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table><div class="grp-caption">${esc(caption)}</div></div>`;
}

/* ---------------- FLOTA ---------------- */
function renderFleet(){
  // Destruir cualquier mapa Leaflet previo ANTES de tocar el DOM: el nodo #fleetMap
  // de un render anterior ya no existe una vez que innerHTML se reasigna más abajo,
  // así que si no liberamos la instancia acá quedaría una referencia colgante.
  if(fleetMapInstance){ fleetMapInstance.remove(); fleetMapInstance=null; }

  const rows = state.fleet.map(r=>({r, s:evalStatus(r)}));

  // UG presentes en la flota actual (para el selector) + validación de selección vigente
  const ugCounts=new Map();
  let ugNoneCount=0;
  rows.forEach(x=>{
    const ug=ugOf(state.deviceNames.get(x.r.device_serial));
    if(ug) ugCounts.set(ug,(ugCounts.get(ug)||0)+1);
    else ugNoneCount++;
  });
  const ugList=[...ugCounts.keys()].sort((a,b)=>a.localeCompare(b));
  if(state.ugFilter!=="all"){
    const stillValid = state.ugFilter==="none" ? ugNoneCount>0 : ugCounts.has(state.ugFilter);
    if(!stillValid) state.ugFilter="all";
  }

  // Alcance según UG: las tarjetas de resumen y la tabla cuentan lo mismo
  let scoped=rows.slice();
  if(state.ugFilter!=="all"){
    if(state.ugFilter==="none") scoped=scoped.filter(x=>!ugOf(state.deviceNames.get(x.r.device_serial)));
    else scoped=scoped.filter(x=>ugOf(state.deviceNames.get(x.r.device_serial))===state.ugFilter);
  }
  const counts={total:scoped.length,critical:0,warning:0,ok:0,stale:0};
  scoped.forEach(x=>{ counts[x.s.level]++; if(x.s.ageMin!=null && x.s.ageMin>60) counts.stale++; });
  // Contador de flota en el título del topbar (sólo vista flota; se limpia en el detalle).
  const brandCount=document.getElementById("brandCount");
  if(brandCount) brandCount.textContent = counts.total>0 ? ` · ${counts.total} ${counts.total===1?"tablet":"tablets"}` : "";

  // filtro + búsqueda
  let list=scoped.slice();
  if(state.filter==="stale") list=list.filter(x=>x.s.ageMin!=null && x.s.ageMin>60);
  else if(state.filter!=="all") list=list.filter(x=>x.s.level===state.filter);
  const q=state.search.trim().toLowerCase();
  if(q) list=list.filter(x=>{
    if(String(x.r.device_serial||"").toLowerCase().includes(q)) return true;
    if(String(state.deviceNames.get(x.r.device_serial)||"").toLowerCase().includes(q)) return true;
    const trk=state.trackingMap.get(x.r.device_serial);
    if(trk){
      for(const key of ["usuario_smoc","cuadrilla","numero","yacimiento","proveedor","celular"]){
        if(!isNil(trk[key]) && String(trk[key]).toLowerCase().includes(q)) return true;
      }
    }
    return false;
  });
  const gf=state.groupFilter;
  if(gf){
    if(gf.type==="network"){
      list=list.filter(x=>{ const ssid=(!isNil(x.r.wifi_ssid)&&String(x.r.wifi_ssid).trim()!=="")?String(x.r.wifi_ssid):null; return gf.catch?ssid===null:ssid===gf.value; });
    }else if(gf.type==="site"){
      list=list.filter(x=>{ const t=state.trackingMap.get(x.r.device_serial); const yac=(t&&!isNil(t.yacimiento)&&String(t.yacimiento).trim()!=="")?String(t.yacimiento):null; return gf.catch?yac===null:yac===gf.value; });
    }
  }

  // orden
  const dir=state.sort.dir==="asc"?1:-1;
  list.sort((a,b)=>{
    const k=state.sort.key;
    if(k==="status"){
      if(LEVEL_RANK[a.s.level]!==LEVEL_RANK[b.s.level]) return (LEVEL_RANK[a.s.level]-LEVEL_RANK[b.s.level]);
      const aa=a.s.ageMin==null?1e12:a.s.ageMin, bb=b.s.ageMin==null?1e12:b.s.ageMin;
      return bb-aa; // más viejo primero
    }
    let av,bv;
    if(k==="serial"){av=(a.r.device_serial||"");bv=(b.r.device_serial||"");return av.localeCompare(bv)*dir;}
    if(k==="signal"){av=a.s.ageMin==null?1e12:a.s.ageMin;bv=b.s.ageMin==null?1e12:b.s.ageMin;return (av-bv)*dir;}
    if(k==="battery"){av=a.r.battery_pct==null?-1:a.r.battery_pct;bv=b.r.battery_pct==null?-1:b.r.battery_pct;return (av-bv)*dir;}
    if(k==="pending"){av=a.r.points_pending==null?-1:a.r.points_pending;bv=b.r.points_pending==null?-1:b.r.points_pending;return (av-bv)*dir;}
    if(k==="version"){av=a.r.app_version_code==null?-1:a.r.app_version_code;bv=b.r.app_version_code==null?-1:b.r.app_version_code;return (av-bv)*dir;}
    if(k==="wifi"){
      av=(a.r.wifi_ssid||"").toLowerCase(); bv=(b.r.wifi_ssid||"").toLowerCase();
      if(av==="" && bv!=="") return 1;
      if(bv==="" && av!=="") return -1;
      return av.localeCompare(bv)*dir;
    }
    return 0;
  });

  const arrow=(k)=> state.sort.key===k?`<span class="arrow">${state.sort.dir==="asc"?"▲":"▼"}</span>`:"";

  // KPI jerarquizados: Atención dominante. Clic filtra; clic en el activo limpia
  // (ver handler). "Sin reportar +1 h" mantiene su filtro stale (mejora conservada).
  const cardsHtml=`
    <div class="cards">
      <div class="card kpi-crit clickable ${state.filter==="critical"?"active":""}" data-filter="critical"><div class="kpi-lbl"><span class="kpi-dot"></span>Atención</div><div class="kpi-num">${counts.critical}</div></div>
      <div class="card kpi-warn clickable ${state.filter==="warning"?"active":""}" data-filter="warning"><div class="kpi-lbl">En observación</div><div class="kpi-num">${counts.warning}</div></div>
      <div class="card kpi-ok clickable ${state.filter==="ok"?"active":""}" data-filter="ok"><div class="kpi-lbl">OK</div><div class="kpi-num">${counts.ok}</div></div>
      <div class="card kpi-stale clickable ${state.filter==="stale"?"active":""}" data-filter="stale"><div class="kpi-lbl">Sin reportar +1 h</div><div class="kpi-num">${counts.stale}</div></div>
    </div>`;

  const groupChip = gf ? `<span class="filter-chip">${gf.type==="network"?"Red":"Sitio"}: ${esc(gf.value)}<button class="chip-x" id="groupChipClear" type="button" title="Quitar filtro">✕</button></span>` : "";
  const toolbar=`
    <div class="toolbar">
      <div class="search">
        <span class="mag"></span>
        <input id="searchInput" type="search" placeholder="Buscar por serial, nombre, cuadrilla…" value="${esc(state.search)}" />
      </div>
      <div class="segmented" id="filterSeg">
        <button data-filter="all" class="${state.filter==="all"?"on":""}">Todas</button>
        <button data-filter="critical" class="${state.filter==="critical"?"on":""}"><span class="dot dot-crit"></span>Atención</button>
        <button data-filter="warning" class="${state.filter==="warning"?"on":""}"><span class="dot dot-warn"></span>Observación</button>
        <button data-filter="ok" class="${state.filter==="ok"?"on":""}"><span class="dot dot-ok"></span>OK</button>
      </div>
      <div class="ugfilter">
        <label for="ugFilterSelect">UG</label>
        <select id="ugFilterSelect">
          <option value="all" ${state.ugFilter==="all"?"selected":""}>Todas</option>
          ${ugList.map(ug=>`<option value="${esc(ug)}" ${state.ugFilter===ug?"selected":""}>${esc(ug)} (${ugCounts.get(ug)})</option>`).join("")}
          ${ugNoneCount>0?`<option value="none" ${state.ugFilter==="none"?"selected":""}>Sin UG (${ugNoneCount})</option>`:""}
        </select>
      </div>
      <div class="segmented" id="viewSeg">
        <button data-view="table" class="${state.fleetView==="table"?"on":""}">Tabla</button>
        <button data-view="map" class="${state.fleetView==="map"?"on":""}">Mapa</button>
        <button data-view="by-network" class="${state.fleetView==="by-network"?"on":""}">Por red</button>
        <button data-view="by-site" class="${state.fleetView==="by-site"?"on":""}">Por sitio</button>
      </div>
      ${groupChip}
      <button class="iconbtn" id="exportCsvBtn" type="button" title="Descargar CSV de la flota filtrada" ${list.length===0?"disabled":""}>⬇ Exportar</button>
    </div>`;

  let bodyHtml;
  let mapGeopoints=null; // sólo se llena si vamos a inicializar Leaflet después de pintar el DOM
  let offMapCaptionHtml="";
  if(rows.length===0){
    bodyHtml=`<div class="tablewrap"><div class="empty"><div class="big">No hay tablets reportando</div>Ninguna tablet envió un latido en los últimos 30 días.</div></div>`;
  }else if(list.length===0){
    bodyHtml=`<div class="tablewrap"><div class="empty"><div class="big">Sin resultados</div>No hay tablets que coincidan con el filtro o la búsqueda.</div></div>`;
  }else if(state.fleetView==="map"){
    // Mismo `list` que la tabla (ya filtrado por UG + estado + búsqueda): sólo
    // separamos los que tienen coordenadas finitas de los que no.
    const withCoords=[], withoutCount0=list.length;
    list.forEach(({r,s})=>{
      const lat=isNil(r.last_fix_lat_approx)?null:Number(r.last_fix_lat_approx);
      const lon=isNil(r.last_fix_lon_approx)?null:Number(r.last_fix_lon_approx);
      if(lat!=null && lon!=null && isFinite(lat) && isFinite(lon)) withCoords.push({r,s,lat,lon});
    });
    const withoutCount=withoutCount0-withCoords.length;
    if(withCoords.length===0){
      bodyHtml=`<div class="tablewrap"><div class="empty"><div class="big">Sin zona para mapear</div>Ninguna tablet del filtro tiene zona para mapear</div></div>`;
    }else{
      bodyHtml=`<div class="tablewrap"><div id="fleetMap"></div></div>`;
      mapGeopoints=withCoords;
      if(withoutCount>0){
        offMapCaptionHtml=`<div class="offmap-caption">${esc(String(withoutCount))} tablets sin zona (no aparecen en el mapa)</div>`;
      }
    }
  }else if(state.fleetView==="by-network"){
    const groups=groupFleet(
      list,
      x=>x.r.wifi_ssid,
      x=>x.r.net_validated===true && x.r.last_sync_ok===false,
      "Sin red / datos móviles"
    );
    bodyHtml=groupTable(groups, "Red", "Con internet, sin GIS",
      "Orden: primero las redes con más equipos “con internet pero sin GIS”. “Sin red” junta datos móviles y equipos aún sin la versión que reporta la red.", "network");
  }else if(state.fleetView==="by-site"){
    const groups=groupFleet(
      list,
      x=>{ const t=state.trackingMap.get(x.r.device_serial); return t?t.yacimiento:null; },
      x=>x.s.ageMin!=null && x.s.ageMin>SILENCE_MIN,
      "Sin asignar"
    );
    bodyHtml=groupTable(groups, "Sitio", "Sin reportar +2h",
      "Orden: primero los sitios con más equipos sin reportar. “Sin asignar” junta equipos sin yacimiento cargado en el seguimiento.", "site");
  }else{
    const trs=list.map(({r,s})=>{
      const m=LEVEL_META[s.level];
      const rowCls = s.level==="critical"?"rowcrit":s.level==="warning"?"rowwarn":"";
      const pcls = r.points_pending==null?"pend":(r.points_pending>20?"pend crit":r.points_pending>0?"pend hi":"pend");
      const dname=state.deviceNames.get(r.device_serial);
      const trk=state.trackingMap.get(r.device_serial);
      const serial=esc(r.device_serial);
      // Chips de seguimiento: etiqueta gris + valor. Sin ficha → fila de una línea
      // con acción fantasma "＋ Seguimiento" (elimina el "Sin datos…" repetido).
      const chips=[];
      if(trk){
        const add=(k,key)=>{ if(!isNil(trk[key])) chips.push(`<span class="tchip"><span class="k">${k}</span> ${esc(trk[key])}</span>`); };
        add("Cuadrilla","cuadrilla"); add("Yacimiento","yacimiento"); add("Proveedor","proveedor");
        add("Nº","numero"); add("Cel","celular"); add("SMOC","usuario_smoc");
      }
      const hasSeg=chips.length>0;
      const ghost = hasSeg?"":`<span class="seg-ghost">＋ Seguimiento</span>`;
      const rowA=`<tr data-serial="${serial}" class="rowA ${rowCls}${hasSeg?"":" solo"}">
        <td><div class="serialcell"><span class="serial">${esc(r.device_serial||"—")}</span>${dname?`<span class="serial-name">${esc(dname)}</span>`:""}</div></td>
        <td><div class="statuscell">
          <span class="tagbadge tb-${m.cls}">${m.word}</span>
          <span class="motivo${s.level==="ok"?" ok":""}">${esc(s.main)}</span>
          ${ghost}
        </div></td>
        <td>${s.recv?`<span class="mono" style="font-size:12.5px;color:var(--dim)">${relTime(s.recv)}</span>`:'<span class="faint">sin dato</span>'}</td>
        <td><span class="batt">${batteryBar(r.battery_pct,r.battery_charging)}</span></td>
        <td class="pendcell" style="text-align:right"><span class="${pcls}">${r.points_pending==null?"—":r.points_pending}</span></td>
        <td class="vercell">${r.app_version_name?'<span class="mono" style="font-size:12px;color:var(--faint)">'+esc(r.app_version_name)+'</span>':'<span class="faint">—</span>'}</td>
        <td class="wificell">${r.wifi_ssid?'<span class="mono" style="font-size:12px;color:var(--dim)">'+esc(r.wifi_ssid)+'</span>':'<span class="faint">—</span>'}</td>
      </tr>`;
      const rowB = hasSeg
        ? `<tr data-serial="${serial}" class="rowB ${rowCls}"><td colspan="7" class="trackcell"><div class="trackchips">${chips.join("")}</div></td></tr>`
        : "";
      return rowA+rowB;
    }).join("");
    const capCount = list.length===counts.total ? `${counts.total} tablets` : `${list.length} de ${counts.total} tablets`;
    bodyHtml=`<div class="tablewrap"><table class="fleettbl">
      <thead><tr>
        <th class="sortable" data-sort="serial">Serial ${arrow("serial")}</th>
        <th class="sortable" data-sort="status">Estado y motivo ${arrow("status")}</th>
        <th class="sortable" data-sort="signal">Última señal ${arrow("signal")}</th>
        <th class="sortable" data-sort="battery">Batería ${arrow("battery")}</th>
        <th class="sortable" data-sort="pending" style="text-align:right">Pend. ${arrow("pending")}</th>
        <th class="sortable" data-sort="version">Versión ${arrow("version")}</th>
        <th class="sortable" data-sort="wifi">Red WiFi ${arrow("wifi")}</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table></div><div class="fleet-caption">${capCount} · ordenadas por severidad · clic en una fila para ver el detalle</div>`;
  }

  content().innerHTML=`<div class="wrap">${cardsHtml}${toolbar}${bodyHtml}${offMapCaptionHtml}</div>`;

  // eventos
  // Clic en un KPI/segmento aplica ese filtro; clic en el que ya está activo lo limpia.
  content().querySelectorAll(".card.clickable").forEach(c=>c.onclick=()=>{ const k=c.dataset.filter; state.filter=(state.filter===k?"all":k); render(); });
  content().querySelectorAll("#filterSeg button").forEach(b=>b.onclick=()=>{ const k=b.dataset.filter; state.filter=(k==="all"?"all":(state.filter===k?"all":k)); render(); });
  content().querySelectorAll("#viewSeg button").forEach(b=>b.onclick=()=>{ fleetMapView=null; state.fleetView=b.dataset.view; render(); });
  content().querySelectorAll(".grouptbl tbody tr[data-gval]").forEach(tr=>tr.onclick=()=>{
    state.groupFilter={type:tr.dataset.gtype, value:tr.dataset.gval, catch:tr.dataset.gcatch==="1"};
    fleetMapView=null; state.fleetView="table"; render();
  });
  const gcClear=document.getElementById("groupChipClear");
  if(gcClear) gcClear.onclick=()=>{ state.groupFilter=null; render(); };
  const exportBtn=document.getElementById("exportCsvBtn");
  // `list` es el mismo array (filtrado por UG+estado+búsqueda y ordenado) que
  // renderiza la tabla/mapa de este render puntual: closure captura la versión
  // vigente, no una copia vieja — cada render vuelve a wirear este handler.
  if(exportBtn){ exportBtn.onclick=()=>exportFleetCsv(list); }
  const ugSel=document.getElementById("ugFilterSelect");
  if(ugSel){ ugSel.onchange=()=>{ state.ugFilter=ugSel.value; render(); }; }
  const si=document.getElementById("searchInput");
  if(si){ si.oninput=()=>{ state.search=si.value; render(); const el=document.getElementById("searchInput"); if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);} }; }
  content().querySelectorAll("th.sortable").forEach(th=>th.onclick=()=>{
    const k=th.dataset.sort;
    if(state.sort.key===k) state.sort.dir=state.sort.dir==="asc"?"desc":"asc";
    else { state.sort.key=k; state.sort.dir=k==="serial"?"asc":(k==="signal"?"desc":"desc"); if(k==="status")state.sort.dir="asc"; }
    render();
  });
  content().querySelectorAll("tbody tr[data-serial]").forEach(tr=>tr.onclick=()=>openDetail(tr.dataset.serial));

  // Hover agrupado: rowA (datos) + rowB (seguimiento) son 2 <tr> del mismo device y
  // deben iluminarse juntas. Sin selector CSS de "hermano anterior", se resuelve con
  // JS: cada par comparte un mismo listener que agrega/saca .hoverpair en ambas filas.
  content().querySelectorAll(".fleettbl tbody tr.rowA").forEach(tr=>{
    const sib=tr.nextElementSibling;
    const pair = sib && sib.classList.contains("rowB") ? [tr,sib] : [tr];
    const on=()=>pair.forEach(x=>x.classList.add("hoverpair"));
    const off=()=>pair.forEach(x=>x.classList.remove("hoverpair"));
    pair.forEach(x=>{ x.addEventListener("mouseenter",on); x.addEventListener("mouseleave",off); });
  });

  // El nodo #fleetMap recién existe en el DOM después de asignar innerHTML arriba;
  // por eso la inicialización de Leaflet va acá al final, no en la rama de bodyHtml.
  if(mapGeopoints && mapGeopoints.length) initFleetMap(mapGeopoints);
}

/* ---------------- Mapa de flota (Leaflet) ---------------- */

// Lee el color de estado desde las custom properties del tema activo (--crit /
// --warn / --ok) en vez de hardcodear hex, así el mapa respeta claro/oscuro
// igual que el resto de los indicadores.
function statusColor(level){
  const varName = level==="critical"?"--crit":level==="warning"?"--warn":"--ok";
  const v=getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  return v||"#888";
}

// Offset visual DETERMINÍSTICO por serial, sólo para separar en pantalla tablets
// que caen en la misma celda de grilla de ~1km (last_fix_lat/lon_approx puede
// repetirse entre varios dispositivos). Es puramente decorativo: NUNCA se
// persiste, no viaja al servidor ni se usa para ningún cálculo — sólo desplaza
// dónde se dibuja el círculo en este mapa.
function serialDisplayOffset(serial){
  const h=hashStr(String(serial||""));
  const angle=(h%6283)/1000;          // 0..2π aprox
  const radius=((h>>>8)%400)/100000;  // 0..~0.004°
  return {dLat:radius*Math.sin(angle), dLon:radius*Math.cos(angle)};
}

// Caja aproximada de Argentina, para el encuadre inicial del mapa: un fix
// espurio (p.ej. una tablet que reportó en México) no debe alejar toda la vista.
const AR_BOUNDS = { latMin:-56, latMax:-21, lonMin:-74, lonMax:-53 };
function inArgentina(lat,lon){
  return lat>=AR_BOUNDS.latMin && lat<=AR_BOUNDS.latMax && lon>=AR_BOUNDS.lonMin && lon<=AR_BOUNDS.lonMax;
}

function initFleetMap(points){
  const mapEl=document.getElementById("fleetMap");
  if(!mapEl || typeof L==="undefined") return;

  const map=L.map("fleetMap");
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:19,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  const group=L.featureGroup();
  const placed=[];
  // Orden contextual para el tooltip (yacimiento primero); labels de SEG_FIELDS.
  const TIP_SEG_ORDER=["yacimiento","usuario_smoc","cuadrilla","proveedor","numero","celular"];
  function trackingTipRows(serial){
    const t=state.trackingMap.get(serial);
    if(!t) return "";
    const rows=TIP_SEG_ORDER
      .filter(k=>!isNil(t[k]) && String(t[k]).trim()!=="")
      .map(k=>`<div class="mtip-row"><span>${esc(SEG_FIELD_LABELS.get(k))}</span><b>${esc(t[k])}</b></div>`);
    if(!rows.length) return "";
    return `<div class="mtip-sep"></div>${rows.join("")}`;
  }
  points.forEach(({r,s,lat,lon})=>{
    const off=serialDisplayOffset(r.device_serial);
    const dLat=lat+off.dLat, dLon=lon+off.dLon;
    const m=LEVEL_META[s.level];
    const dname=state.deviceNames.get(r.device_serial);
    const nameHtml = dname?esc(dname):esc(r.device_serial||"—");
    const marker=L.circleMarker([dLat,dLon],{
      radius:9, color:"#fff", weight:1.5, fillOpacity:.9, fillColor:statusColor(s.level)
    });
    // Tooltip enriquecido: nombre + estado (lo que ya había) + red WiFi, señal
    // y última señal, para leer el mapa sin abrir el detalle.
    const ssidTxt = (!isNil(r.wifi_ssid) && String(r.wifi_ssid).trim()!=="") ? esc(r.wifi_ssid) : "—";
    let sigTxt;
    if(r.net_transport==="wifi") sigTxt = r.wifi_rssi_dbm!=null ? `WiFi · ${r.wifi_rssi_dbm} dBm` : "WiFi";
    else if(r.net_transport==="cellular") sigTxt = r.cell_level!=null ? `Celular · ${r.cell_level}/4` : "Celular";
    else if(r.net_transport==="ethernet") sigTxt = "Cable";
    else sigTxt = "Sin red";
    const relSig = s.recv ? esc(relTime(s.recv)) : "sin dato";
    marker.bindTooltip(
      `<div class="mtip">
         <div class="mtip-name">${nameHtml}</div>
         <div class="mtip-status">${esc(m.word)}: ${esc(s.main)}</div>
         ${trackingTipRows(r.device_serial)}
         <div class="mtip-sep"></div>
         <div class="mtip-row"><span>Red WiFi</span><b>${ssidTxt}</b></div>
         <div class="mtip-row"><span>Señal</span><b>${esc(sigTxt)}</b></div>
         <div class="mtip-row"><span>Última señal</span><b>${relSig}</b></div>
       </div>`,
      {direction:"top", offset:[0,-10], className:"fleet-tip"}
    );
    marker.on("click",()=>openDetail(r.device_serial));
    marker.addTo(group);
    placed.push({dLat,dLon});
  });
  group.addTo(map);

  if(fleetMapView){
    // Refresco / re-render estando en el mapa: restaurar la vista del usuario
    // (no re-encuadrar, así no se "aleja solo" cada ciclo de auto-refresco).
    map.setView(fleetMapView.center, fleetMapView.zoom);
  }else{
    // Primer ingreso al mapa: encuadrar SOLO los puntos dentro de Argentina.
    // Los outliers (fix espurio) igual se dibujan, pero no deforman la vista.
    const inAR = placed.filter(p=>inArgentina(p.dLat,p.dLon));
    const src = inAR.length ? inAR : placed;
    if(src.length===1){
      map.setView([src[0].dLat,src[0].dLon],10);
    }else if(src.length){
      map.fitBounds(L.latLngBounds(src.map(p=>[p.dLat,p.dLon])).pad(0.3));
    }else{
      map.setView([-40,-63],4); // fallback: centro de Argentina
    }
  }
  // Recordar la vista para que el próximo re-render (refresco) la preserve.
  map.on("moveend",()=>{ fleetMapView={center:map.getCenter(), zoom:map.getZoom()}; });
  fleetMapInstance=map;
}

/* ---------------- DETALLE ---------------- */
async function openDetail(serial){
  state.view="detail"; state.device=serial; state.history=null; state.histLoading=true; state.zoom=null;
  state.tracking=null; state.trackingHistory=null; segDraft={};
  render();
  await Promise.all([loadHistory(), loadTracking()]);
}

function renderDetail(){
  // El detalle es de un solo equipo: sacar el contador de flota del título.
  const bc=document.getElementById("brandCount"); if(bc) bc.textContent="";
  const r = state.fleet.find(x=>x.device_serial===state.device);
  if(!r){ content().innerHTML=`<div class="wrap"><a class="back" id="backBtn">← Volver a la flota</a><div class="empty" style="margin-top:20px">No se encontró la tablet.</div></div>`; document.getElementById("backBtn").onclick=goFleet; return; }
  const s=evalStatus(r); const m=LEVEL_META[s.level];
  const diag=diagnose(r,s);
  const dname=state.deviceNames.get(r.device_serial);

  const kv=(k,val,bad,tip)=>{
    const cls=val.n?"null":"";
    const badcls = bad==="crit"?"bad":bad==="warn"?"warn":"";
    const tipAttr = tip?` title="${esc(tip)}"`:"";
    return `<div class="kv ${badcls}"${tipAttr}><span class="k">${k}</span><span class="v ${cls}">${esc(val.t)}</span></div>`;
  };
  // Encabezado de cada panel; el panel "sospechoso" se resalta (borde + tag + título en color).
  const gh=(key,title)=>{
    const isC = diag.culprit===key;
    return `<div class="group${isC?" culprit":""}"${isC?` style="border-color:var(--${m.cls})"`:""}>`
      + (isC?`<span class="culprit-tag" style="background:var(--${m.cls})">Sospechoso</span>`:"")
      + `<h3${isC?` style="color:var(--${m.cls})"`:""}>${title}</h3>`;
  };
  // grupos
  const gBatt=`${gh("bat","Batería")}
    ${kv("Nivel", num(r.battery_pct,"%"), (r.battery_pct!=null&&r.battery_pct<15&&r.battery_charging!==true)?"crit":(r.battery_pct!=null&&r.battery_pct<30&&r.battery_charging!==true)?"warn":"")}
    ${kv("Cargando", boolTxt(r.battery_charging))}
    ${kv("Enchufe", {t:isNil(r.battery_plugged)?"—":({ac:"AC",usb:"USB",wireless:"Inalámbrico",none:"Desconectada"}[r.battery_plugged]||r.battery_plugged),n:isNil(r.battery_plugged)})}
    ${kv("Temperatura", num(r.battery_temp_c,"°C",1), (r.battery_temp_c!=null&&r.battery_temp_c>45)?"warn":"")}
    ${kv("Voltaje", num(r.battery_voltage_mv,"mV"))}
    <div class="battcond-head">Condición (últimos días)</div>
    <div id="battCond"></div>
  </div>`;
  const gNet=`${gh("net","Conectividad")}
    ${kv("Transporte", {t:isNil(r.net_transport)?"—":({wifi:"WiFi",cellular:"Celular",ethernet:"Cable",none:"Sin red",other:"Otro"}[r.net_transport]||r.net_transport),n:isNil(r.net_transport)})}
    ${kv("Internet real", boolTxt(r.net_validated), r.net_validated===false?"warn":"", FIELD_TIP.net_validated)}
    ${kv("Señal WiFi", num(r.wifi_rssi_dbm,"dBm"), "", FIELD_TIP.wifi_rssi)}
    ${kv("Red WiFi", {t:isNil(r.wifi_ssid)?"—":String(r.wifi_ssid),n:isNil(r.wifi_ssid)}, "", FIELD_TIP.wifi_ssid)}
    ${kv("Señal celular", isNil(r.cell_level)?{t:"—",n:true}:{t:r.cell_level+" / 4",n:false}, "", FIELD_TIP.cell_level)}
    ${kv("Modo avión", boolTxt(r.airplane_mode), r.airplane_mode===true?"crit":"")}
  </div>`;
  const zoneLat = isNil(r.last_fix_lat_approx)?null:Number(r.last_fix_lat_approx);
  const zoneLon = isNil(r.last_fix_lon_approx)?null:Number(r.last_fix_lon_approx);
  const hasZone = zoneLat!=null && zoneLon!=null && isFinite(zoneLat) && isFinite(zoneLon);
  const gGps=`${gh("gps","GPS / Ubicación")}
    ${kv("Ubicación activada", boolTxt(r.location_enabled), r.location_enabled===false?"crit":"", FIELD_TIP.location_enabled)}
    ${kv("Permiso de ubicación", boolTxt(r.location_permission_ok), r.location_permission_ok===false?"crit":"", FIELD_TIP.location_perm)}
    ${kv("Precisión último punto", num(r.last_fix_accuracy_m,"m"), "", FIELD_TIP.fix_accuracy)}
    ${kv("Antigüedad último punto", {t:fmtDur(r.last_fix_age_s),n:isNil(r.last_fix_age_s)}, "", FIELD_TIP.fix_age)}
    ${kv("Zona aproximada", hasZone?{t:zoneLat.toFixed(2)+", "+zoneLon.toFixed(2),n:false}:{t:"—",n:true})}
  </div>`;
  let gMap="";
  if(hasZone){
    const bboxParts=[zoneLon-0.05, zoneLat-0.03, zoneLon+0.05, zoneLat+0.03].map(n=>encodeURIComponent(n));
    const bbox=bboxParts.join("%2C");
    const marker=encodeURIComponent(zoneLat)+"%2C"+encodeURIComponent(zoneLon);
    const osmSrc=`https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${marker}`;
    const gmapsUrl=`https://maps.google.com/?q=${encodeURIComponent(zoneLat)},${encodeURIComponent(zoneLon)}`;
    gMap=`<div class="mapcard">
      <h3>Zona aproximada</h3>
      <div class="mapbody">
        <p class="mapcaption">precisión ~1 km — la posición exacta solo va al GIS</p>
        <iframe src="${esc(osmSrc)}" loading="lazy" title="Zona aproximada de la tablet"></iframe>
        <a class="maplink" href="${esc(gmapsUrl)}" target="_blank" rel="noopener">Abrir en Google Maps ↗</a>
      </div>
    </div>`;
  }
  const gSys=`${gh("sis","Sistema")}
    ${kv("Almacenamiento libre", fmtMB(r.storage_free_mb), (r.storage_free_mb!=null&&r.storage_free_mb<500)?"crit":"")}
    ${kv("Almacenamiento total", fmtMB(r.storage_total_mb))}
    ${kv("RAM libre", fmtMB(r.ram_free_mb))}
    ${kv("RAM baja", boolTxt(r.ram_low), r.ram_low===true?"warn":"", FIELD_TIP.ram_low)}
    ${kv("Último reinicio", {t:fmtEpoch(r.boot_time),n:isNil(r.boot_time)}, "", FIELD_TIP.boot_time)}
    ${kv("Android", {t:isNil(r.android_version)?"—":String(r.android_version),n:isNil(r.android_version)})}
    ${kv("Parche de seguridad", {t:isNil(r.security_patch)?"—":String(r.security_patch),n:isNil(r.security_patch)}, "", FIELD_TIP.security_patch)}
  </div>`;
  const gApp=`${gh("app","App y envío al GIS")}
    ${kv("Versión app", {t:isNil(r.app_version_name)?"—":r.app_version_name+(r.app_version_code?" ("+r.app_version_code+")":""),n:isNil(r.app_version_name)})}

    ${isNil(r.last_sync_error_detail)?"":`<div class="kv warn"><span class="k">Detalle del error</span><span class="v detail">${esc(r.last_sync_error_detail)}</span></div>`}
    ${kv("Último envío", {t:fmtEpoch(r.last_sync_at),n:isNil(r.last_sync_at)})}
    ${kv("Exenta de ahorro batería", boolTxt(r.battery_optimization_exempt), r.battery_optimization_exempt===false?"warn":"", FIELD_TIP.battery_opt_exempt)}
    ${kv("Modo ahorro de energía", boolTxt(r.power_save_mode), r.power_save_mode===true?"warn":"", FIELD_TIP.power_save)}
    ${kv("Config. corporativa OK", boolTxt(r.managed_config_ok), r.managed_config_ok===false?"crit":"", FIELD_TIP.managed_config)}
    ${kv("Último latido (servidor)", {t:fmtDateTime(toDate(r.received_at)),n:isNil(r.received_at)}, "", FIELD_TIP.last_heartbeat_srv)}
    ${kv("Reloj de la tablet", {t:fmtEpoch(r.reported_at),n:isNil(r.reported_at)}, "", FIELD_TIP.device_clock)}
  </div>`;

  const rangeSeg=`<div class="phctl">
    <span class="zoomlbl" id="zoomLbl"></span>
    <button id="resetZoom" class="hidden">↺ Ver todo</button>
    <div class="segmented" id="rangeSeg">

  // Banner de diagnóstico (Atención/Observación) o tira "Todo en orden" (OK).
  const relSig = s.recv?relTime(s.recv):"sin dato";
  let diagHtml;
  if(s.level==="ok"){
    diagHtml=`<div class="ok-strip"><span class="d"></span><span class="t">Todo en orden</span><span class="s">— sin acciones pendientes. Última señal ${relSig}.</span></div>`;

    diagHtml=`<div class="diag">

  document.getElementById("backBtn").onclick=goFleet;

/* ---------------- SEGUIMIENTO (panel editable + historial) ---------------- */

// device_tracking: 6 campos editables por el usuario. updated_by/updated_at
// los pone el trigger del server — nunca se mandan desde acá.
const SEG_FIELDS=[
  {key:"usuario_smoc", label:"Usuario de SMOC"},
  {key:"cuadrilla",    label:"Nombre de cuadrilla"},
  {key:"numero",       label:"Número"},
  {key:"yacimiento",   label:"Yacimiento"},
  {key:"proveedor",    label:"Proveedor"},
  {key:"celular",      label:"Nro de celular"},
];
const SEG_FIELD_LABELS=new Map(SEG_FIELDS.map(f=>[f.key,f.label]));

// Borrador en memoria de lo que la persona está tipeando, separado de
// state.tracking (la última foto confirmada del server). El refresco automático
// de 60s y los clicks en "24h/7d/30d" fuerzan un renderDetail() completo que
// reconstruye #segCard desde cero; si el valor de cada input saliera solo de
// state.tracking se perdería lo tipeado a mitad de edición. Cada input escribe
// acá en su oninput (sin re-renderizar), y renderSeguimiento() lee de acá primero.
// Se vacía al abrir otra tablet (openDetail) y al guardar con éxito, momento en
// que state.tracking ya refleja lo guardado.
let segDraft={};

function seguimientoFieldValue(key){
  if(Object.prototype.hasOwnProperty.call(segDraft,key)) return segDraft[key];
  const t=state.tracking;
  return (t && !isNil(t[key])) ? t[key] : "";
}

function seguimientoHistoryHtml(){
  const h=state.trackingHistory;
  if(h==null) return `<div class="empty" style="padding:16px">Cargando historial…</div>`;
  if(h.length===0) return `<div class="empty" style="padding:16px">Sin cambios registrados</div>`;
  const items=h.map(row=>{
    const label=SEG_FIELD_LABELS.get(row.campo)||row.campo;
    const before=isNil(row.valor_anterior)?"—":row.valor_anterior;
    const after=isNil(row.valor_nuevo)?"—":row.valor_nuevo;
    return `<div class="seg-hist-item"><span class="meta">${esc(fmtDateTime(toDate(row.changed_at)))} · ${esc(row.changed_by||"—")}:</span> ${esc(label)}: "${esc(before)}" → "${esc(after)}"</div>`;
  }).join("");
  return `<div class="seg-hist-list">${items}</div>`;
}

function seguimientoCardHtml(){
  const t=state.tracking;
  const fieldsHtml=SEG_FIELDS.map(f=>`<div class="seg-field">
    <label for="seg_${f.key}">${esc(f.label)}</label>
    <input id="seg_${f.key}" data-field="${f.key}" type="text" autocomplete="off" value="${esc(seguimientoFieldValue(f.key))}" />
  </div>`).join("");
  const caption = (t && t.updated_by) ? `<div class="seg-caption">Última edición: ${esc(t.updated_by)} · ${esc(fmtDateTime(toDate(t.updated_at)))}</div>` : "";
  return `<div class="mapcard">
    <h3>Seguimiento</h3>
    <div class="mapbody seg-body">
      <div class="seg-grid">${fieldsHtml}</div>
      <div class="seg-actions">
        <button class="btn-primary" id="segSaveBtn" type="button">Guardar</button>
        <span id="segMsg" class="seg-msg dim"></span>
      </div>
      ${caption}
      <details class="raw">
        <summary><span class="chev">▶</span> Historial de cambios</summary>
        ${seguimientoHistoryHtml()}
      </details>
    </div>
  </div>`;
}

function renderSeguimiento(){
  const card=document.getElementById("segCard");
  if(!card) return;

  // Preservar foco + posición del cursor si la persona está escribiendo en un
  // campo de Seguimiento justo cuando este re-render dispara (ver comentario
  // de segDraft arriba) — el valor ya está a salvo vía segDraft, esto es sólo
  // para no interrumpir la edición (no perder el cursor / no cerrar el teclado).
  const active=document.activeElement;
  let focusField=null, selStart=null, selEnd=null;
  if(active && active.tagName==="INPUT" && active.dataset && active.dataset.field && card.contains(active)){
    focusField=active.dataset.field; selStart=active.selectionStart; selEnd=active.selectionEnd;
  }

  card.innerHTML=seguimientoCardHtml();

  card.querySelectorAll("input[data-field]").forEach(inp=>{
    inp.oninput=()=>{ segDraft[inp.dataset.field]=inp.value; };
  });
  const saveBtn=document.getElementById("segSaveBtn");
  if(saveBtn) saveBtn.onclick=saveSeguimiento;

  if(focusField){
    const el=card.querySelector(`input[data-field="${focusField}"]`);
    if(el){ el.focus(); if(selStart!=null) el.setSelectionRange(selStart,selEnd); }
  }
}

async function loadTracking(){
  const serial=state.device;
  if(!serial) return;
  if(!sb){
    state.tracking=null; state.trackingHistory=[];
    if(state.view==="detail") renderSeguimiento();
    return;
  }
  try{
    const [trackRes,histRes]=await Promise.all([
      sb.from("device_tracking").select("*").eq("device_serial",serial).maybeSingle(),
      sb.from("device_tracking_history").select("*").eq("device_serial",serial).order("changed_at",{ascending:false}).limit(50),
    ]);
    if(trackRes.error) throw trackRes.error;
    if(histRes.error) throw histRes.error;
    if(state.device!==serial) return; // la persona ya navegó a otra tablet mientras esto cargaba
    state.tracking=trackRes.data||null;
    state.trackingHistory=histRes.data||[];
  }catch(e){
    console.warn("No se pudo cargar Seguimiento:",e);
    if(state.device===serial && state.trackingHistory==null) state.trackingHistory=[];
  }
  if(state.view==="detail") renderSeguimiento();
}

async function saveSeguimiento(){
  const serial=state.device;
  if(!serial) return;
  const btn=document.getElementById("segSaveBtn");
  const msgEl=document.getElementById("segMsg");
  if(!sb){ if(msgEl) msgEl.textContent="No hay conexión con el servidor."; return; }

  const row={device_serial:serial};
  SEG_FIELDS.forEach(f=>{
    const el=document.getElementById("seg_"+f.key);
    const v = el ? el.value.trim() : "";
    row[f.key] = v===""?null:v;
  });

  const prevLabel=btn?btn.textContent:"";
  if(btn){ btn.disabled=true; btn.textContent="Guardando…"; }
  if(msgEl) msgEl.textContent="";
  try{
    const {error}=await sb.from("device_tracking").upsert(row,{onConflict:"device_serial"});
    if(error) throw error;
    segDraft={}; // lo guardado ya está confirmado — de acá en más mostrar lo que devuelva el server
    // Reflejar el guardado en la columna "Cuadrilla / Yacimiento" de la tabla de
    // flota sin esperar al próximo refresh de loadTrackingMap() (surgical update).
    state.trackingMap.set(serial,{...(state.trackingMap.get(serial)||{}),...row});
    // loadTracking() reconstruye #segCard (repuebla updated_by/updated_at server-side
    // + refresca el historial), lo que reemplaza btn/msgEl por nodos nuevos — por eso
    // el mensaje de éxito se escribe DESPUÉS, sobre el nodo fresco, no sobre msgEl.
    await loadTracking();
    const freshMsg=document.getElementById("segMsg");
    if(freshMsg) freshMsg.textContent="Guardado ✓";
  }catch(e){
    if(msgEl) msgEl.textContent="No se pudo guardar. "+(e&&e.message?e.message:"");
    if(btn){ btn.disabled=false; btn.textContent=prevLabel||"Guardar"; }
  }
}

function rangeMs(){ return state.range==="24h"?864e5 : state.range==="7d"?7*864e5 : 30*864e5; }
const GAP_MIN=35; // umbral de hueco

// Condición de batería (desgaste) a partir del historial ya cargado del detalle.
// Puro hecho, sin veredicto: descarga %/h (tamiz de desgaste) + temperatura.
function batteryConditionHtml(history){
  const h=Array.isArray(history)?history:[];
  const rows=h.map(d=>{ const dt=toDate(d.received_at); return {t:dt?dt.getTime():null, pct:d.battery_pct, chg:d.battery_charging, temp:d.battery_temp_c}; })
    .filter(x=>x.t!=null).sort((a,b)=>a.t-b.t);
  if(rows.length<2) return `<div class="battcond-msg">sin datos suficientes</div>`;
  // Descarga: tramos desenchufados con % en baja, gap <= 2 h.
  let dropSum=0, hoursSum=0;
  for(let i=1;i<rows.length;i++){
    const a=rows[i-1], b=rows[i];
    if(a.pct==null||b.pct==null||a.chg===true||b.chg===true) continue;
    const dh=(b.t-a.t)/3600000;
    if(dh<=0||dh>2) continue;
    if(b.pct<a.pct){ dropSum+=(a.pct-b.pct); hoursSum+=dh; }
  }
  const disch = hoursSum>0 ? {t:`~${(dropSum/hoursSum).toFixed(1)} %/h (desenchufada)`, n:false} : {t:"—", n:true};
  // Temperatura: máxima + mediana.
  const temps=rows.map(x=>x.temp).filter(v=>v!=null);
  let tMax=null, tMed=null;
  if(temps.length){
    tMax=Math.max(...temps);
    const s=[...temps].sort((x,y)=>x-y), mi=Math.floor(s.length/2);
    tMed = s.length%2 ? s[mi] : (s[mi-1]+s[mi])/2;
  }
  const tcls=v=>v==null?"":(v>45?"crit":v>40?"warn":"");
  const row=(k,val,bad)=>`<div class="kv ${bad==='crit'?'bad':bad==='warn'?'warn':''}"><span class="k">${k}</span><span class="v ${val.n?'null':''}">${esc(val.t)}</span></div>`;
  return row("Descarga", disch, "")
    + row("Temp. máxima", tMax!=null?{t:tMax.toFixed(1)+" °C",n:false}:{t:"—",n:true}, tcls(tMax))
    + row("Temp. típica", tMed!=null?{t:tMed.toFixed(1)+" °C",n:false}:{t:"—",n:true}, tcls(tMed));
}

function updateBattCond(){
  const el=document.getElementById("battCond");
  if(!el) return;
  el.innerHTML = state.histLoading ? `<div class="battcond-msg">calculando…</div>` : batteryConditionHtml(state.history);
}

  area.style.minHeight="";

  const now=Date.now(), full1=now, full0=now-rangeMs();

  area.innerHTML=
    chartBlock("Batería","%, con tramos de carga marcados",
      lineChart(pts,{x0,x1,yMin:0,yMax:100,get:r=>r.battery_pct,color:"var(--ok)",fill:true,chargeGet:r=>r.battery_charging}))
    + connectivityBlock(pts,x0,x1)
    + chartBlock("Puntos pendientes de envío","cantidad acumulada sin llegar al GIS",
      lineChart(pts,{x0,x1,yMin:0,yMax:null,get:r=>r.points_pending,color:"var(--warn)",fill:true}));

  // tabla cruda últimos ~20
  const last=h.slice().sort((a,b)=>(toDate(b.received_at)?.getTime()||0)-(toDate(a.received_at)?.getTime()||0)).slice(0,20);
  const rtrs=last.map(d=>{

    return `<tr>

      <td>${isNil(d.last_sync_ok)?'<span class="faint">—</span>':(d.last_sync_ok?'<span style="color:var(--ok-text)">OK</span>':'<span style="color:var(--crit-text)">falló</span>')}</td>
      <td>${isNil(d.wifi_rssi_dbm)?'<span class="faint">—</span>':d.wifi_rssi_dbm+" dBm"}</td>

  }).join("");
  rawArea.innerHTML=`<details class="raw"><summary><span class="chev">▶</span> Últimos ${last.length} latidos (crudos)</summary>
    <div class="rawscroll"><table>
      <thead><tr><th>Hora (servidor)</th><th>Batería</th><th>Red</th><th>Pend.</th><th>Envío</th><th>WiFi</th></tr></thead>
      <tbody>${rtrs}</tbody>

  updateZoomCtl();

function updateZoomCtl(){
